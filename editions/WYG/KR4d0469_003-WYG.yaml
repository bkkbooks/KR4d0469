body:
  text: 陳剛中詩集卷三元陳孚撰玉堂藁偕翰林學士劉東崖禮部侍郎李兩山登憫忠寺閣天京朝萬國十二舜神州宫闕開中禁關河拱上游扶桑彤氣近析木紺光流劔佩千牛衛旌幢五鳳樓玉泉蟠地湧金塔插天浮北嶽瑶符出南溟瘴霧收人皆躋夀域我亦步瀛洲智不如犀首癡猶過虎頭帝恩難獨報儒術幸同儔偶此登阿閣悠然望薊丘長庚欣識李太乙願依劉雪擁飛狐夜風號涿鹿秋黄花堆徑濕紅葉帶城幽且盡一壺酒掀髯送白鷗中書大丞相安公延説四書因以詩呈帶礪家聲耀八寰中書獨押紫微班捧持日月祥雲上汎滌山河湛露間緑竹正歌淇澳美赤松聊伴穀城閒聖門别有經綸事更對青燈話孔顔同國子司業王士能監丞滕仲禮謁南城文廟觀周宣王石鼔各模數本以歸退之昔為石鼔歌子瞻亦嘗咏石鼔我從江右遊京師眼見石鼔心欲舞周室中興流彘餘盡復蒼姬舊疆土大蒐岐下選車徒虎賁三千健於虎想當刻石紀勛時載命臣籕臣吉甫豈惟猗那清廟詩要紀豐功繼下武兌戈和弓無復存此獨不磨耀千古鯉鱮貫栁字斑斑勢如雷文斵天斧由漢訖唐棄草菅大觀輦致圖書府黄金填畫失之奢金輪已整黄河櫓燕山潭潭素王宫太史夜奏神光吐誰知至寶在人間乃是鳳篆龍章祖我皇御天開三雍石渠金馬列李杜鼓昔有十今存七搜剔崖藪尚可補小儒更有筆如椽作元一經配鄒魯呈性齋左丞馬公峩峩崑崙圃乃在天中央絳樓十二級浮空燦琳琅中有神仙人霞冠青霓裳兩手握元化翊此日月光箕以播清飈斗以傾天漿蒼生愚何知但覺太極長海亦不可極山亦不可量安得分刀圭滌我塵土腸晨登繄巫閭回望燕南垂碣石無飛埃滹沱清漣漪天子坐明堂十二藻火衣千官擁雉尾佩劔光陸離南海翥朱鳥東海翻蒼螭銅池亦何有五色光明芝大哉惠澤流􅌲蠢亦熙熙誰憐向陽者一寸園中葵出自薊北門巍城鬱崔嵬大車如游龍翠盖浮紅埃堂皇十二衢中有千仭臺黄金不復見凍雨深蒼苔偉哉千載人結址羅英材精誠貫白日鐵石為之開願為雙黄鵠奮起凌蒿萊呈閻靜齋學士四海文聲重泰山十年忠讜侍龍顔屢分天上金蓮炬獨占人間玉筍班麟筆露寒青簡濕鳳章雲藹紫泥閒孤帆已有東風便喜近蓬萊碧水間承㫖野莊董公殊勲清節孚聞之縉紳紀以八詩􅉀府旂常䇿世勲一門忠孝氣凌雲衣冠盛事誰堪比漢後元間萬石君鐵馬長驅棧路髙捷旗飛渡大江濤漢南烟栁蓬婆雪猶識團花舊戰袍手分恩露活惸嫠春滿棠隂犬有氂二十年間如昨日兒童猶誦衛州碑正色鴛行第一人危言耿耿聳朝紳忠州不負平生學曽與皇家去佞臣黒豸冠峩柏署隂誰知偃月蓄機深九重堯舜明如日獨照生來鐵石心鄭公已拜大司農倐捧詞林詔墨濃自是玉皇香案吏仙班合領六鼇峰不負朝廷七十年樓臺無地榻蕭然清名當與温公並只欠河南二頃田萬卷青燈味道腴苦心欲探魯鄒餘朝回立馬天衢上又典春衣買異書偕承㫖野莊公學士劉東崖侍講張西巖遊慶夀寺憩僧牕有作金碧樓臺䕶紫霞一塵不到小牕紗老僧倚杖對踈竹童子抱琴眠落花風起亂飛千萬蝶日斜閒啄兩三鴉自知不是名韁客消得曹溪一滴茶八月朝回呈學士閻靜齋李野齋趙方塘十二光明闕神仙奠巨鼇風清雙雉扇天近五龍袍玉斧紅雲合金莖碧露髙聖明千載㑹喜色動旌旄獸舞龍墀下青衫葉半枯九重明主聖八品小臣孤鵲但依三帀鷹猶待一呼毎慙僚吏問袖有諫書無得家書寄呈可翁家兄風南枝北兩沉沉忽有書來似萬金三十年間聽雨夢八千里外望雲心舊書尚喜黄盈架先隴應添碧滿林若問客游新況味紫薇花發玉堂深燕山除夜簡唐靜卿待制張勝非張幼度編修萬井笙歌徹曉聞千官待漏夜紛紛奴星有栁祠窮鬼臣朔無柑遺細君長樂鐘聲敲碧漢廣寒簾影捲紅雲自知報國無他技賴有詩書可䇿勲慶夀寺有小殿榜曰聖容奉誌公泗州二菩薩皆真身所塑也元在江左金梁王宗弼取置于此煌煌朱雀闕金榜瑶宫開中有二梵士巍坐芙蕖臺秣陵安樂禁松頂靈禽胎紫㡌姓何人適從何國來胡為悉萃此雪面淨黄埃惟金名王子仗鉞征南回兵鋒烈於火所至山岳摧遂令千載骨亦復罹其災至人身無寄如水浮枯荄無往亦無去澹然不可猜但有古刀尺天機妙剸裁坐閲金世祚變滅同寒灰聖容儼如故伊人安在哉稽首一笑粲檜露滴蒼苔野莊公與孚論漢唐以來宰相有王佐氣象得四人焉命孚為詩并呈商左山參政謝敬齋尚書諸葛孔明當塗哮吼健於虎卯金一脉如寒土民間只有大耳兒真是髙光宗祏主南陽笑脱青蘿衣出試烏林萬火炬永安受遺輔太子漢賊未誅忠膽苦峨眉山髙錦江寒白旄一麾招摇怒出師兩紙流涕書三代而下無此語中營若不墜長星何止逆雛釁征鼔定知盛事繼蒼姬禮樂光華曜千古謝安石典午叔世失綱紐紫髯老奴垂涎久謝公笑麾九錫文姑熟一夜骨已朽繼以草付臣又土九十六萬猰㺄吼白羽從容别墅棋破賊只在一尊酒長淮西風夜鶴鳴坐閲兵車見雲母自古毉國到危殆始見擎天活人手誰能白刄在頸時正色毅然以死守如公信是社稷臣定論要期千載後裴中立唐自天寶藩臣强關東割地尊犬狼憲皇赫怒思賢佐十載始得緋衣郎六龍夾日升黄道魑魅誰敢爭天光惟有蔡州煽逆焰假鉞一指孤臣亡瘦骨昻昻五尺長四夷聞名驚欲僵垂紳搢笏坐台席隱然一身佩巨唐唐家太常紀勲烈後有西平前汾陽誰如公探皇王祕笑睨伊召躋羲黄司馬君實熙寧誤相老安石惡政變盡法三尺頭㑹箕斂禍尚可動驅赤子陷鋒鏑端明相君從西來大梁草木亦動色紫簾中坐女堯舜甘雨一洗大地赤平生受用惟忠貞妻無完裙面如腊十年布衾二頃田走卒兒童服至徳誰將誣語仆魏碑丹心自有蒼蒼識至今涑水一卷書尚為乾坤立人極翰苑薦為應奉文字二十韻謝大司徒并呈諸學士天上金鑾客人間第一流贄為唐内相禹拜漢元侯鯤海三千水龜峰十二樓月寒紅燭夜風淡紫薇秋鳳誥窺姚姒麟篇振魯鄒佩隨宫漏逺衣染御煙浮淑氣騰奎璧祥光射斗牛焜煌青瑣闥縹緲紫霞洲瑪瑙濡堯罋珊瑚燿漢鈎駝蹄中禁釡豹尾上方騶僕本師黄卷生惟伴白鷗親庭雙鶴髪家事一漁舟偶預天官選來為帝里遊緑章蒙獨薦青史許同修故郡驚王勃新豐異馬周隊隨魚圉圉角喜鹿呦呦勢似飛三鳳功如輓萬牛桑榆終有望葑菲未為愁國士恩難報書生志易酬誓堅冰雪操正色贊皇猷聞胡紫山被召以詩寄呈明良千載事際㑹古尤艱海岳歸皇極乾坤見紫山就湯三聘後若孔一瓢間願為蒼生起休辭鬢雪斑史館暮春有感呈承㫖野莊公滿篋詩章未必傳微官束縳正堪憐蘼蕪滿院又三月苜蓿堆盤無一錢洛邑家書黄犬上巴山舊業子規前夜聽兒女青燈話似覺朱顔老去年呈承㫖忠齋留公以樂只君子遐不眉夀為韻成詩大極生乾坤萬化一槖籥孰為萬化宗天其付先覺偉哉百世士逸響振木鐸深衣花木間清風藐獨樂皇皇六合間不朽惟此理至人妙氣機乃見混沌始春風七十年鶴髪映兒齒誰知玉雪胸千載矢天只公昔坐黄閣玉鉉宣殊勲今居石渠署袖手看浮雲出處固有意豈令俗子聞但持方寸丹期以酬明君聖明握龍御六合混文軌麟閣有老臣國脉長在是峨峨太華山浩浩黄河水寂寥百年間今見歐陽子仙人白玉闕踏月戲紫霞坐閲東海水秋風捲塵沙爛柯亦偶爾人世驚咨嗟龍漢刼運長誰能測幽遐蓬萊在何許縹緲烟濤浮飛仙駕飈輪徑踞金鼇頭手攜五色筆遊戲三千秋回語枋榆鷃識此逍遥不小草有臭味願附青松枝況我三世間受此露雨滋家庭有勝事陶冶非公私稽首拜牀下喜色津鬚眉神京三月春光風滿宇宙曉視紫薇庭寳烟篆金獸豈無魯侯詩昌熾今猶舊願泛玻璃巵起舞為公夀哭菊山學士太乙青藜命世儒枕中鴻寳定何如三年席上陪金馬一旦階前墜玉魚益部已空耆舊傳洛陽猶誦治安書蒲輪昔日盧龍道忽見秋風送旐旟呈李野齋學士青蓮居士長庚星手抉河漢翻滄溟天子呼來紅潮湧氷唾濺几玻瓈聲仙人上天不可見耳孫更侍金鑾殿欲補十二龍火衣袖中别有五色線上帝冊府紅玉田宫鬟對捧芙蕖烟彩毫草就雞竿詔矞雲赤遶寥陽天江南客子年三十布袍鴉黒秋霜濕欲買俠骨無千金雄龍一夜銅花泣今朝出門忽瞻驚後五百載逢長庚安得剛風九萬里從公横騎太乙鯨呈傅初庵學士天不生先覺斯文孰指南一朝真學士四海老初庵福備康寧五尊兼爵齒三年年衿佩合庭下祝彭耼霖雨商巗佐經綸百世餘又騎箕尾宿來主壁奎書社稷周皇極衣冠漢石渠夜聞宣室召温詔賜安輿李尚書有唐畫飛燕姊弟為嬌困相倚之態玉鸞支枕珊瑚几緑鬢微困嬌相倚太液東風扶不起一雙芙蓉裊秋水粉痕誰寫温柔鄉淺蛾對蹙烟峰長意中似有赤鳳凰唾花猶濺榴裙香合歡繡帶飄金縷含情兩兩春無語冰魂縹緲空千古月落鴛鴦渡南浦辛卯天夀聖節孚應制草前行樂章曰至聖至明之曲樂令張温以弦管至翰苑調集之壬辰元㑹亦孚撰進曰金階萬嵗聲敬紀以詩我本漁樵東海邊脚踏雲頭歌扣舷數載偶承金馬詔朝衣蹈舞丹墀前三十六簴列兩序黄鐘大鏞儼在懸摐宫扣羽韻雜遝泠泠間以朱絲絃紫衣樂使總干立翠衫迴電風翩翩白雪一聲度霄漢宛如戞玉聲琅然曲聲未已笙簫急滿空嘹亮清而圓又如疎松亂石内崖冰迸落千丈泉景星出房慶雲爛重華盛徳三千年野人忽聞靈韶調但覺魂夢遊鈞天去年協律攜管籥按賡至聖至明篇今年又奏金階曲瑶巵大宴蕊珠仙恭惟皇元混六合八音均和八風宣微臣何幸際昌運得與麟鳳瞻初筵惟願聖明億萬夀瑞光長照太微躔二詞附見至聖至明之曲黄鍾宫鬱羅瑶文凝瑞虹中黄御陽貝闕珠宫漢盤寳露濃香浮太液芙蓉天九重萬國衣冠㑹同旒光一㸃海霞紅太平日月軒轅紀藐皇風崆峒金階萬嵗聲夾鍾宫絳幘籌催觚闕上暖迴虬箭聽鳴鞘聲傳鳳輦宫花閙蟬玉戚朱弦擁紅雲遶黄金殿皇國萬年泰階平六符煇現滿神州和風乍轉天開雉扇玉簫聲顫奉蟠桃慶瑶池宴感懐呈龎夷簡修撰張幼度應奉濫直承明署身閒似地仙雖無官長罵未敢酒家眠瘦已寛朝服貧須乞酒錢最愁親舍逺夢遶白雲邊五湖烟浪濶短棹早歸休有母思臣密無人問客周闗河雙髩晚風雨一燈秋留取金鑾夢寒汀對白鷗李妃籹臺歌南城之西臺巍巍欲問何代築者誰臺前老叟為我語創自泰和明昌時金章宗年號道陵御宇思傾國道陵章宗陵名掖庭婑媠千蛾眉其中榮寵震天下依稀憶得李宸妃朝陪金根輦升殿夕則専御流蘇幃一月日邊明炯炯章宗與妃共對妝臺口占曰二人土上坐令妃對應聲曰一月日邊明帝大喜六宫珠翠無光煇恩禮殊絶與后等但無副笄翬翟衣少嘗沒入宫籍監本妃論妃家閥何卑微腐木作柱古所戒胡乃重色輕國為斯臺實昔湯沐地瓊臺開鏡迎朝曦想見雙蟬緑委地蘭釵半墮湘雲垂麝臍龍髓嬌不盡腰肢栁裊一尺圍雪艷透膚腻紅重仙姿何待鉛華施妝成獨對東風笑藕花一朶開漣漪君王濃香夢魂裏紫宸晏朝酣不知諫臣當時盡結舌空有伶者為嘲譏伶官嘗對御叱飛禽曰烏鳥你只向裏飛一朝房山弓劔墜燕飛啄矢不復遺衛王有詔下永巷太阿無情血淋漓妖容寸斬何足惜金源自此鴻圗衰寶鈿零落今安在露桃猶似濕臙脂武元辛勤建大業武元金太祖謚子孫一笑寒灰飛臺非不髙築亦壯無奈社稷基先隳我聞叟語忽驚起謂叟不必苦嗟咨君不見檿弧箕服亡周國古來何限褒龍漦與李子構讀開元天寶遺事四十乾坤拱紫宸東風只屬倚䦨人玉鳬波煗驪山曉金犢烟横繡嶺春七夕有􅁫留羽客千秋無鏡泣孤臣紅塵一騎君休笑中有漁陽萬騎塵為靜齋學士講夀大赤冲氣開鴻濛仙人飛下方諸宫蒼麟吐書衛青童從以丹篆金芙蓉仙人炯炯雙碧瞳珠庭鼎角冰雪容倒瀉銀潢沃筆鋒玉桮繁露凌星虹絳紗鸞扇天九重翠鳳銜出芝泥封賜以冊府羣玉峰七寳之牀雙蓮紅春光蕩淡薇花風肺肝一鏡磨寒銅行須便歸碧紗籠永為四海斯文宗我來滿泛玻瓈鍾更無諂語歌祝雍君不見孔孟之道與天通願身任此傳無窮出健徳門赴上都分院北樓急鼔絶南樓疎鐘鳴盥櫛未及竟騶官戒晨征三年去鄉井已覺身飄零今朝别此去又有千里行懐君豈不願王命各有程小車如雞栖軋軋不得停出門見居庸萬仭參天青鄰家三數嫗對我清淚傾問我善飯否慮我衣裘輕大笑揮之去我豈兒女情觀光樓試上危樓望東風尺五天一溪寒瀉月萬壑暝含烟古塞黄雲外巍臺白雁邊誰憐家萬里有客擁衾眠龍虎臺雙塔聳琅玕星辰手可攀偉哉丹鳳輦駐此巨鼇山地拱中黄上天回太紫間微臣遥稽首想像見龍顔昌平縣狄梁公廟七尺衣冠儼古祠一生身佩國安危至今遼海殘霞外猶有虞淵取日時居庸關車稜稜石角角車聲彭彭鬬石角馬蹄蹴石石欲落不知何年鬼斧鑿僅與青天通一握上有藤束萬仭之崖下有泉噴千丈之壑太行羊腸蜀劔閣身熱頭痛懸度索一夫當關萬夫卻未必有此竒巘崿吾皇神聖混地絡烽火不紅停夜柝但有地險今猶昨我扶瘦笻息倦脚欲叩往事雲漠漠平沙風起鳴凍雀彈琴峽月作金徽風作絃清聲豈待指中傳伯牙别有髙山調寫在疎松亂石邊仙人枕居庸萬馬遶山前未必蒼苔睡晏然見説華山風日暖何如移伴白雲眠懐來縣榆林青茫茫寒烟三十里忽聞雞犬聲見此千家市石橋百尺横其下跨溈水人言古溈州殘城無乃是民家坐土牀嬉笑圍老稚糲飯侑山䓤勸客顔有喜足跡半天下愛此俗淳美醉就軟莎眠夢遊葛天氏統幕千里茫茫草色青亂塵飛逐馬蹄生不知何代開軍府猶有當年統幕名洪贊井深有六七十丈者洪贊山岧嶤勢如舞雙鳳大井千尺深窈然見空洞野人驅十牛汲以五石甕滴水寶如珠一甕十室共我生海東頭漣漪飽清弄嘗聞惠山泉萬里馹騎送急呼茗枕來試作清淨供鵰窠道中曉馳漠北暮居庸千里山河一瞬中江左故人知我否馬蹄聲裏過秋風車外塵沙十文黄車中客子黒貂裳拂雲堆上閒回首無數征鴻帶夕陽桑乾䫈昔聞桑乾名今日登桑乾桑乾是否不必問但覺兩耳天風寒大峯小峯屹相向空際谽谺一千丈燕雲回首夕陽間長川歴歴平於掌人家如蠣粘石壁白土堆簷髙半尺門外氊車風雨來平地轟轟驚霹靂漢唐百戰場緑草今滿磧野夫耕田間猶有舊鐵㦸道傍誰歟三歎息古袍古帽江南客李老峪聞杜鵑呈應奉馮昻霄三月十九日客行桑乾坂杜鵑啼一聲清淚悽以澘故園渺何處萬里隔雲巘燕子三見歸我車猶未返杜鵑爾何來弔我萬里逺同行二三子相顧一笑莞問我此何鳥怪我苦悲惋掉頭不復言日落千山晚赤城驛一溪流水遶千峰宛與天台景物同魂夢不知家萬里却疑只在赤城中雲州天險龍門峽懸崖兀老蒼千蹄天馬躍一寸地椒香夜雪青氊帳秋烟白土房路人遥指語十里是温陽獨石何載天星墮緑苔千㝷忽作鐵崔嵬風沙道上人誰識曽見天台雁蕩來秦長城馳車出長城飲馬長城窟朔雲黄浩浩萬里見秋鶻白骨渺何處腥風捲寒沙蒙恬劒下血化作川上花祖龍一何愚社稷付征杵長城土未乾秦宫已焦土千載不可問但聞鬼夜哭矯首武陵源紅霞滿川谷金蓮川金章宗與李妃避暑于此有泰和宫今廢茫茫金蓮川日映山色赭天如碧油幢萬里罩平野野中何所有深草臥羊馬昔人建離宫今存但古瓦秋風吹白波猶似哀淚洒村女采金蓮芳香紅滿把豈知步蓮人豔骨掩泉下人生如蜉蝣百年無堅者安得萬斛酒浩歌對花瀉明安驛道中野鵲山頭野草黄野狐嶺上月茫茫五更但覺天風冷帳頂青氊一寸霜貂䑕紅袍金盤陀仰天一箭雙天鵞雕弓放下笑歸去急鼔數聲鳴駱駝黄沙浩浩萬雲飛雲際草深黄䑕肥貂帽老翁騎鐵馬胸前抱得黄羊歸風吹灤水湧如淮十萬雕弓飲馬來長笑一聲鞭影動金鞍飛過李陵臺李陵臺約應奉馮昻霄同賦落日悲笳鳴隂風起千嶂何處見長安夜夜倚天望臣家羽林中三世漢飛將尚想甘泉宫虎賁擁仙仗臣豈負朝廷忠義夙所尚横天青茫茫萬里隔亭障可望不可到血淚墮汪漾空有臺上石至今尚西向夜宿灤河觜兒貂裘塵土黒如鴉海角孤臣扈翠華萬里親庭應鶴髪一生客路又龍沙囊中粟捲蓯蓉葉盤裏蔬堆芍藥芽漸見馬前添喜氣五雲天近玉皇家桓州躍馬長城外方知眼界寛晴天雷雨急暑夜雪霜寒鐵騎秋呼鶻金盤曉薦貛栁營弓劔滿容我一儒冠開平即事百萬貔貅擁御閑灤江如帶緑迴環勢超大地山河上人在中天日月間金闕觚稜龍虎氣玉階閶闔鷺鴛班微臣亦有河汾策願叩剛風上帝關天開地闢帝王州河朔風雲拱上游鵰影逺盤青海月雁聲斜送黒山秋龍岡勢遶三千陌月殿香飄十二樓莫笑青衫窮太史御爐曽見衮龍浮呈杜醉經參政君不見貞觀天子開龍祚黄閣中羅真宰輔河海如鏡淨無塵但有清風一萬古城南尺五今耳孫英聲直欲凌鼻祖太華山髙黄河寒盡收淑氣歸肺腑醉經堂前耿青燈深味道腴探鄒魯萬殊同本豈獨醉要使六合皆鼔舞紫仗曉御明光宫絳紗芙蓉明玉斧曰汝參贊中書權左臯右䕫接步武相印金窠紅屈盤巍押千官坐政府南金象齒奏北闕御河疎栁聞健櫓旱火不光春融融禾麻連空賤如土天下蒼生見雍熙擊壤嬉笑無所苦史臣猶能作頌聲他年願繼尹吉甫戚學士有家藏仲長統闕隱闕宋齊彦趙子昻有詩次韻老瞞盜漢鼎不下安漢公參軍著昌言何如草𤣥雄一壑豈不美奈此塵羇中居然不成往千古空悲風東京名節士偉哉五噫鴻山間變姓名詎肯隨旌弓贈太原卜者張開夫張生千載後讀易見天心萬象有竒耦一天無古今疎簾垂晝寂短榻卧秋隂自筮何時達霜華已滿簪送羅子有奉亦愚右丞之喪歸杭風沙萬里一征鞍短㡌疎髯涙未乾廣武山川空阮籍長平賔客只任安故園有夢鵲聲急大厦無依燕翅寒江左故人如見問為言燈火客金鑾呈張上卿尚方勅賜紫金冠詔領諸仙玉府班神變紫芒雙劔上家傳黄石一編間瑶壇蘸罷鵷班靜金闕朝回鶴馭閒為問清生符在否有人望氣倚函關送修撰輔伯賢同知滑州又作州官去秋霜㸃髩紗風生白馬渡月冷紫薇花三釡娱親老雙旌放吏衙重來定何日雲路有靈槎承㫖樂山唐公八月十二日宴于其第以詩奉呈聖代開皇極恩波雨露沾篤生嵩嶽佐載叶渭川占社稷千齡㑹衣冠五福兼朱絃新律吕黄石舊韜鈐徳望三朝眷儀刑四海瞻摛詞追賈馬勵學探羲炎宇宙歸青照風雲奮紫髯議如唐陸贄詩似晉陶潛踐履剛而毅精神智以恬一區楊子宅萬軸鄴侯籖山色秋凝璧烟光晝捲簾金鑾辭秉燭玉鉉待調鹽大匠規模逺宗公號令嚴王臣躬蹇蹇君子徳謙謙此日鳴朝鳳清秋近夜蟾瑶簪環杖履寳墨出湘縑北海賔長滿東山屐未厭車聲闐繡户花影舞朱簷樂幸追靈運憂當後仲淹願施經濟具天下待鍼砭春日遊江鄉園一名小城南城南三月花亂開花間羯鼔聲如雷蟬衫麟帶誰家子笑騎白馬穿花來美人如花映碧水榴裙吹舞金鵲尾手折楊枝擲水中腰裊如弓送窮鬼人言此是上河梁滿川羅綺東風香年年窮鬼送不了波心驚起雙鴛鴦蓮莖一寸緑芒短老盡碧桃春不管遊人醉歸夜迢迢十二天街御烟暖野莊公年過七十以詩為夀北嶽開䓤舊中朝列艾厖聲猷今第一氣量古無雙乙夜陪宸蹕丁年擁帥幢扈龍踰瀚海躍馬渡岷江善化行鄘􅆁威名振冉駹儀曹尊北府亞相式南邦鳩扈敦農稼烏臺戢吏􅮭諫租寛杼軸議戰偃矛鏦霄漢常騰鶚郊原不吠尨信知天有柱始覺水無洚焜燿青藜杖穹窿碧瑣牕清絃調大吕巨茟奮長杠奥學蠡難測雄詞鼎可扛富惟儲古帖老不廢寒釭教義燕山竇遺安峴首龐一門風穆穆百世澤淙淙喜見麟垂紱還斟蟻泛缸占熊符舊兆飛鶴度新腔晴雪浮籩豆春風扇柷椌僕雖慙駑鈍公毎念愚惷鑛喜洪罏鑄鐘容寸筳撞陳蕃猶下榻張籍已收瀧願繼周南雅長歌福禄降至元壬辰呈翰林院請補外微臣官蟻虱無力報乾坤政爾廣文館何如神武門世情三峽險歸夢五湖昏朝市山林上無非荷國恩萬里家書到催歸未得歸山妻愁掩袂稚子病牽衣客舍園林僻官曹簿領稀清時鴛鷺滿容得一鷗飛索米長安市光隂電影移酒尊貧不飲藥裹病相隨憤激櫻桃賦凄凉苜蓿詩臣心清似水暮夜有天知送應奉張幼度同知冠州張子美少年濯濯春月栁夜牕三尺琴六籍洞户牖我遊承明廬見此真益友金匱共校讎過眼十八九僚吏坐俗談語乃不出口美哉徳如玉温縝世未有近詔開東觀天童爛瓊玖我本木强人技已陳芻狗君胡亦不留得州大如斗男兒抱竒氣榮進付之偶血指古則然今何忽袖手但莫負所學千載有不朽北風號枯桑落葉滿林藪過君薊南門山色照尊酒監州豈不佳千里離父母願回判花筆桑麻勸南畝竹馬歌兒童定勝牛馬走明年我南歸雲卧鼻雷吼當哦山中詩寄君一搔首寄揚州教胡石齋淮海胡文學名猶滿帝都人誰憐李白我欲泣楊朱家昔啼飢甚身今病渴無竹西歌吹近想見列生徒昔日光明闕昻然有此翁不聞前賈傅俄見罷申公瘦已肩如鶴貧猶氣似虹北門端有待豈必滯儒宫陳剛中詩集巻三
