body:
  text: 陳剛中詩集附録元史列傳梁曾字貢父燕人祖守正父德皆以曾貴贈安定郡公曾少好學日記書數千言中統四年以翰林學士承旨王鶚薦辟中書左三部令史三轉為中書省掾至元十年用纍考及格授雲南諸路行省都事佩銀符久之升員外郎十五年轉同知廣南西道左右兩江宣撫司事明年除知南陽府唐鄧二屬州為襄陽府所奪曾按圗經稽國制以聞事得復舊南陽在宋末為邊鄙桑柘未成而嵗賦絲民甚苦之曾請折輸布民便之十七年朝廷以安南世子陳日烜不就徴選曽使其國召見賜三珠金虎符貂裘一襲進兵部尚書與禮部尚書柴椿偕行至安南語祕不傳明年日烜遣其叔遺愛奉表從曾入獻方物帝封遺愛為安南國王賜幣帛遣歸二十一年除曾湖南宣慰司副使居三年以疾去二十九年改淮西宣慰司副使復以親老辭召至京師入見內殿有旨令曾再使安南授吏部尚書賜三珠金虎符襲衣乘馬弓矢器幣以禮部郎中陳孚為副十二月改授淮安路總管而行三十年正月至安南其國有三門中曰陽明左曰日新右曰雲會陪臣郊迎將由日新門入曽大怒曰奉詔不由中門是我辱君命也即回館既而請開雲會門入曽復執不可始自陽明門迎詔入又責日燇親出迎詔且講新朝尚右之禮以書往復者三次具宣布天子威德而風其君入朝世子陳日燇大感服三月令其國相陶子竒等從曾詣闕請罪并上萬夀頌金册表章方物而以黃金器幣竒物遺曾為贐曾不受以還諸陶子竒八月還京師入見進所與陳日燇往復議事書帝大悅解衣賜之且令坐地上右丞阿里意不然帝怒曰梁曾兩使外國以口舌息兵戈爾何敢爾是日有親王至自和林帝命酌酒先賜曽謂親王曰汝所辦者汝事梁曽所辦吾與汝之事汝勿以為後也復於便殿賜酒饌畹宿禁中語安南事至二鼓方出明日陶子竒等見詔陳其方物象鸚鵡于庭而命曽引所獻象曽以袖引之象隨曽轉如素馴者復命引他象亦然帝以曽為福人且問曰汝亦懼否對曰雖懼君命不敢違帝稱善或讒曽受安南賂者帝以問曽曽對曰安南以黃金器幣竒物遺臣臣不受以屬陶子竒矣帝曰茍受之何不可也尋賜白金一錠金幣二敕中書以使安南三珠金虎符與之仍乘傳之任淮安到官興學校勵風俗河南行省事有疑者皆委曽議之大德元年除杭州路總管户口復者五萬二千四百户請禁莫夜鞠囚遊街酷刑朝廷是之著為令四年丁內艱先是丁憂之制未行曽上言請如禮七年除潭州路總管以未終制不赴明年遷兩浙都轉運鹽使又明年拜雲南行省參知政事賜三珠金虎符尋召還京辭以母喪未葬扶柩北歸至長蘆有旨賜鈔一百錠使營葬十年召為中書參議嘗預燕賜濟遜一襲十一年轉正奉大夫出為河南行省參知政事尋遷湖廣行省參知政事四年以疾辭歸敕賜藥物存問備至皇慶元年仁宗以曽前朝舊臣特授昭文館大學士資德大夫纍章乞致仕不允復起為集賢侍講學士國有大政必命曽與諸老議之延祐元年奉詔代祀中嶽等神還至汴梁以病不復職寓居淮南杜門不通賔客惟日以書史自娛至治二年卒年八十一卒之前十日有大星隕于所居流光燭地人皆異之元諭安南國詔上天眷命皇帝聖旨諭安南國陳日燇省表具悉去嵗禮部尚書張立道奏言曽到安南識彼事體請往開諭使之來朝因遣立道往使今汝國罪愆既已自陳朕復何言若曰孤子在制及畏死道路不敢來朝且有生之類寧有長久安全者乎天下亦復有不死之地乎朕所未諭汝當具聞徒以虛文嵗幣巧飾見欺於義安在故兹詔示想宜知悉元奉使與安南國往復書朝廷奉使吏部尚書梁曽禮部郎中陳孚謹致書于安南國蓋聞禮者敬而已敬孰為重敬君為重敬君孰為先敬君之命為先君天也君之命天之風霆也其敢不敬乎在禮君言至則臣出拜君言之辱使者返其拜送于門外至而迎返而送禮也迎必拜送必拜禮也迎送必拜于門外禮也安南詩書之國嫻于禮者也明詔之至盡禮必矣何待於議然威儀之節行人未有聞焉大懼弗虔無以對揚聖天子之命夫以天威不違顔咫尺綿蕞未習而遽以行之是謂褻天之威斯戾也已用敢布于執事其稽故典及疆而請事及郊而迓及門而拜及阼階而拜以受悉以升降俯伏之序條諸篇章明以告我嘉與擯紹者觀焉毋忽至元三十年正月初一日書孤子致書天使大相公帳下兹審華轡星臨滿城春動便覺有生意矣寶翰中諭以迎接天詔事足仭存念之篤感甚感甚迎接天詔之禮自古有之祖父歸順以來已定常典矧孤之身敢不克盡謹特差本國執政臣黎克復出疆逺迓於其國內禮節使斾至日冀垂教誨山嵐瘴瘧恐非久駐之地幸惟早命膏秣以慰拳拳之望敬此回書切希鑒念不宣至元三十年正月十三日書朝廷奉使吏部尚書梁曽禮部郎中陳孚謹致書于安南國嘗聞古者天子遣使于四方教之曰必咨于周周也者忠信而已曽等仗節萬里祇若聖天子之丕顯休命非遊説之士憑軾掉舌者也今有忠信之言將為執事告慮重譯弗詳不足以敷露悃愊故筆諸書我大元以神武定天下天戈所指靡有不服薄海內外寸天尺地悉歸職方太平混一之盛自開闢以來未之有也安南內附三十餘年于兹國家威德聞之熟矣不必縷言詩曰殷鑒不逺在夏后之世姑以亡宋近事言之宋自先世尊事天朝使價之往來殆非一日中忽改圖負固拒命變詐百出不可億逞嵗戊午憲宗皇帝躬行天討師出夔門聖上濟自江漢次于鄂渚將深入焉賈似道使宋京祈哀于我願奉嵗貢請罷兵息民會振旅北還宋輒包藏禍心乘時僥幸邀截我師將佐後殿者執為軍實幽逺方者有之𨽻伍籍者有之受俘獻捷刻石頌功欺天罔人上下交賀以為江左中興殊不知宋之亡滅實基于此昔鄭人獲蔡司馬公子燮國人皆喜惟子産憂之曰小國而有武功禍孰大焉季武子以齊之兵作林鍾以銘魯功臧孫曰小國幸于大國昭所獲焉以怒之亡之道也宋無子産之智而犯魯之不韙譬猶鳥雀偷生蓬蒿人以鷹鸇偶搏之不中遽謂力能勝之欲奮而與之角不死得乎聖朝之法賞延于世同符唐虞父為萬户侯父陷則子襲之兄為千夫長百夫長兄陷則弟襲之凡己未以後熊羆之士摧鋒破陳執鋭先登者多陷于南將佐之子之弟也上思敵天子之愾下思報父兄不共戴天之讐瀝肝奮膽怒自百倍並請喋血于宋聖上至仁如天念南北生靈皆國赤子冀宋悔禍或有令圖首命翰林學士郝經持書往使乃食言背約執之不使復命既又誘我邊人李壇假以官職啖以金帛資以甲兵教以內叛天下之惡一也不忠於我豈忠于彼者乎復有姦慝之徒懼罪亡命訾短中國以自媒其身而聽其狡謀搆罪弗已蹂我漣海軼我巴蜀虔劉我邊陲蕩搖我生聚我是以有襄樊之圍彼猶不悛人神共怒左右皆曰可伐聖上乃命右丞相興師問罪長江飛渡席卷吳楚錢塘之城望風而下宋於是時方納質子歸使者返侵地釋將佐之囚吁晚矣社稷丘墟君臣共虜固天運有歸亦人謀有以致之也自昔弱敵強寡敵衆借一則可終則必敗蓋窮國之力而無以繼之政如尫疾之人表證雖差而真氣索矣況宋主既死嗣子孤立非有父母拊循之恩股肱以勢逼而離心爪牙以志滿而解體舉國宴安不虞後患卒臨之以重兵人不堪命土崩瓦解此宋狃于己未僥幸之害也暨幼主就擒聖主憐其孕獨不以祖父之罪罪之猶待以不死如天之仁斷可見矣使宋當此己未之後能自省悟思將佐士卒留于南者彼無一毫之益此無一毫之損奉使還北則子弟之怨不深殄殱乃讐未必若是極也國使之至禮而歸之則問罪之師未必舉也稽首請命遣質入侍弗替事大之禮邊人之叛弗納疆場之舊弗亂堯舜在上未必遽泯其社稷也欽以太祖聖武皇帝奕奕聖謨著在清廟若曰敢以顛越弗恭鴟張矯虔從而征之必誅無赦其赤心效順幡然來歸寵之封爵錫之茅土已往之愆一切弗問垂訓萬世昭如日星獨不見髙麗乎髙麗之王克篤忠貞為國藩屛位至上相勳列柱國世祚其王以表四海玄菟樂浪之間民恬物熙雞犬相聞視宋之覆宗絶祀為何如也安南土地人民與夫城池之固兵革之利何敢望宋萬分之一二矧舊臣于宋必知宋之啓釁召禍者矣亦思本國之事或有與類者乎比者王旅徂征微有失利聞諸道路以謂安南似有矜色曽等殊未之信嗚呼此宋之覆轍也安南其肯蹈之乎聖朝用兵不急近效不顧小失今日攻弗下則攻明日今年戰弗克則戰明年至于四伐五伐六伐七伐不勝不已不得不休積以嵗月卒成大業舜之格有苗髙宗之伐鬼方是也一將死一將復出一軍散一軍復合見可而進知難而退亟戰以罷之多方以誤之始雖垂翅終乃收功養威持重以至無敵于天下髙祖之平項羽光武之擒赤眉是也豈若輕躁之兵舉趾髙而心不固再而衰三而竭者哉一勝一負兵家之常君臣之尊卑天下之大經也安南亦既知之數世以來修貢弗缺可嘉也已然事上以實不以文若不束身入朝徒恃區區之幣遷延粉飾求保其國是以豚蹄斗酒祈汙邪甌窶之滿不亦難乎聖上明照萬里之外省所上章深自引咎重選信使復賜溫詔恩至渥也恩不可以屢得使不可以屢至安危之機在此一舉惟逺考三代兩漢征伐勝敗之驗近鑒宋之所以亡髙麗之所以存上遵天子之詔下察行人之辭絶去多疑一以誠敬乘此自新之路趨造于朝瞻覲天威剖符而還以奠南服則帶礪山河永垂苖裔令聞長世輝耀竹帛將自兹始男耕婦織桴鼓晏然無復昔之驚竄駭伏越在草莽豈惟宗祧之慶諸大夫國人實嘉賴之古人有言曰識時務者在乎俊傑逆順禍福坦然明白失今不圖悔無及矣執事者審思焉至元三十年二月二十日書孤子書復天使大相公閣下孤辱蒙華翰圭復垂三足仭教愛之篤感激感激孤臣事天朝自祖至今三十餘年嵗貢不絶雖兩遭兵火終始一心所得罪者獨不能造朝耳孤豈不知禮有君命召不俟駕然其如常情貪生畏死何鳥髙飛魚深逝猶且惟生是懷況人乎若夫天下無不死之地古今無不死之人達此理者惟有佛也人誰能之敝邑之去天朝間關萬里相公諒已備知設若孤以區區弱質強為是行其不死亡于道路者鮮矣孤之死亡固不足恤得不傷乎聖朝愛人及物之仁也乎書曰君天也孤之事君甚于事天天無階而升然猶可以朝夕而對越君無階而覲然猶可以朝夕而向慕孤若不量力而行其復欲求對越向慕得乎孤託以故人之義語言不忌心腹若剖幸惟相公曲為孤子熟圖之萬勿吝教不宣至元三十年二月二十一日書朝廷奉使吏部尚書梁曽禮部郎中陳孚謹致書于安南國曽等弭節而南見世子者屢矣每見必曰小國之事聖朝猶事天也然僻在一隅孤陋寡聞懼弗免于大戾天使辱貺下國惟是安危禍福繫于一言矜其不間而賜之教誨使獲保其人民君之惠也敬同詞以謝弗獲因思古之君子使於四方必有専對也惓惓悃悃若是其至乎故即宋與髙麗逆順存亡之實論著為書以告執事者頃之國老丁公文及其大夫黎克復何維嚴實來致世子之語曰世子與天使共為帝臣然天使先進世子後進也以齒則天使兄也世子弟也兹以聖天子之命鎮撫其社稷寵之以書為賜厚矣然藴奧難見猶未知所以教也幸勿憚再三之瀆明以教我所謂生死骨肉者敢固以請翼日世子躬造舍館且復以書曰孤以故人之義惟曲為孤子熟圖之萬勿吝教嗚呼世子賢乎哉夫以惓惓悃悃求言若是其至而猶有靳焉仁者用心不若是恝也今有二説以復于執事一曰身親入朝臣子之職分也今書曰豈不知禮有君命召不俟駕其如常情貪生畏死何鳥髙飛魚深逝猶且惟生是懷況人乎噫魚鳥何知之有人為萬物之靈死生之理當了然于胸中天詔固曰天下復有不死之地乎夫死生有命大期將至不出户庭死矣豈獨道途之逺能死人哉如其未也惠徼天子之福道途雖逺又何患焉且以民人為念而憚一已之跋涉不思有以濟之非善于謀國者也事固有一勞而可以永逸者今趣嚴入朝計道途往來不過一嵗而永守其國安若磐石此策之上者也二曰子者身之二也昔南越在漢曾遣子嬰齊入覲矣旋踵而還紹父之緒為賢諸侯蓋生于遐方而見中華衣冠禮樂之盛所益多矣今聞世子之長子年幾弱冠與其居于深宫長于婦人之手孰若使之躍馬萬里觀上國光乎嘗讀世子所上表有曰人有得面聖者為千載一遇善哉言乎夫身所以未往者以國不可以無主故也至于子則又何辭焉且人之有子將以幹父之蠱也國有大事身既未往惟子可以代之不以子代之區區一介陪臣可以回聖天子之意乎否也人孰不愛其子世子思國之大事則不可以姑息為愛能遣其子親詣闕下就帥往者落南官軍將佐及奉所侵疆土祈哀請罪天其或矜朝廷從而矜之必因其子以封其父亦必不使其子久淹恤在外畢事反命父子皆受寵榮而國定矣此其次也若夫奉琛飾幣從事虛文之末不以骨肉近臣而使異姓之卿備員以往是欺天也有明詔在行人不敢與聞曽等二人者皆讀聖人書生平履踐維一忠信屋漏無所愧暗室無所欺天地鬼神不可誣也今以世子惓惓悃悃求言若是其至故以二説告言不忠信天地鬼神實照臨之惟執事加之意不宣至元三十年二月草有一日書孤子書復天使大相公閣下孤不肖伏蒙不鄙纍辱賜書詞豐誼渥愛踰骨肉足仭故人拳拳之意敢不盡布腹心以敘萬一如造朝一節孤伏其辜矣蓋恃聖朝如天之仁故每每陳情哀請相公諒已知之兹不復贅且如入朝臣子之榮事也孤豈不欲以子往奈其口尚乳臭筋骨未壯不習鞍馬不慣風霜將如道路何孤年踰而立尚慮不保此身況小子乎若其視之以嬰齊故事則是又重孤之罪也官軍將佐或有遺落乎敝邑者孤父在日已盡搜索如昔戾機夫王部屬烏馬樊參政老少孫路蠻何奉御唐兀甕吉罹氏唐萬户胡英郭全及萬戶千户頭目官軍等輩並已隨次送還訖其餘或瘴死或逃歸者則孤所不知也張尚書至日已嘗言之孤尋問村落諸處至今未有所得孤豈有惜此數人而棄忍一方生靈者哉且孤之所以送還者果有朝旨也抑孤自為之耶彼之在此適徒自取費耳于損益乎何有孤自先父去後茹素持經放生物命猶慮不足以報父恩之萬一況復有囚殺天朝之將佐以纍先父于地下者哉相公雖以是見屬孤固不待言如侵越疆界事斯言尤不可信也詩曰普天之下莫非王土率土之濵莫非王臣小國雖僻在一隅亦大國臣土也邇年方遭兵火百姓死亡田地蕪廢相公之所目擊今以敝邑之地十室九空猶且不足何暇及其餘乎今以小國臣事大國祇栗戰懼猶恐不保何敢萌此驕心乎向者天使往來纍造小國迎送于鹿州小國懼其侵越之罪往往避之但止丘溫而已孤言不信尚有諸天使在今相公所諭有還疆言語誠為大懼孤素無侵疆之意而敢有還疆之辭乎相公既諭之孤亦當戒約其邊氓勿妄生事以體孤事天之誠也夫物所以表誠也傳有獻芹詩有澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釡之器潢汚行潦之水可薦于鬼神可羞于王公蓋在誠非在物也孤僻在炎荒之外逺隔天日其所以表誠者在乎土宜而已今相公乃以為虛間不足以見事君之誠則孤將安所寓誠哉有以寓誠猶不能免其罪戾至于無所寓誠則其罪戾又當何如耶竊惟孤之身既不能造朝孤之子又不能入朝舉國驚惶莫知所措惟有盡其心力託其性命強遣一介心腹老臣代詣天闕陳罪今相公所諭且有骨肉近臣之語孤未審何若人抑兄弟耶抑宗族耶抑心腹老臣耶孤不肖皇天不恤凡兄弟宗族皆無知之人不通古今不達時事設以一人強為此行不惟獲罪于天朝抑又恐貽禍于小國往輩是也相公豈不知之孤以為兄弟宗族名雖至親或為仇讐心腹老臣名雖人臣實則父子孤未審相公之意將用名耶用實耶茍欲用虛名而不用實不惟孤自負不能盡情之罪而相公亦有棄實取虛之纍也孤之此言未免巧飾文詐幸惟相公曲盡其情而矜原之孤安危死生之機繫相公三寸中儻蒙以恤孤為念字民為心特為宛轉一語上達天聽陳六尺無託之情明一方無告之意豈非孤一國生靈獲拜于天地父母之賜雖先祖父聞之地下亦不知手之舞之足之蹈之也區區圖報惟有心香一瓣奉之冥冥不宣至元三十年二月二十五日書朝廷奉使吏部尚書梁曽禮部郎中陳孚謹致書于安南國兹厪顓價寵以餽贐行人何以及此君子砥身礪行猶冰玉也曽等不敏嘗獲聞薦紳先生之訓矣使乎使乎而一旦隳其平生之素磷緇不既甚乎且自下車以來惟是脯資餼牽所以辱候人者多矣屬厭而已又焉用此若以情義之篤有不容釋者繼自今以往惟忠與孝一德以尊天子使行人獲免于戾則受賜深矣不在貨也所有上件餽􅀈敬用返璧不宣至元三十年三月初一日書孤子書復天使大相公閣下兹者伏辱華轡星臨第愧敝邑蕭條無可以為長者待斾回僭以區區菲物為餞禮也來翰謙撝郤之閣下之誼髙矣其如禮何孤謹當分付本國使臣齎到望俯領之若夫圖報寸忱則是又在心不在物也敬此回文切希鑒念不宣至元三十年三月初一日書元安南國進萬夀頌并表奏天錫皇帝帝錫庶民臣祝聖夀億萬年春至元三十年三月吉日安南國臣陳日燇百拜進臣日燇言伏以帝齡億萬方八千嵗春秋之初華祝再三況五百里要荒之外普天交慶曠古未聞臣日燇誠歡誠忭頓首頓首欽惟憲天述道仁文義武大光孝皇帝陛下聰明日躋勇智天錫以一怒而安天下以五福而錫庶民奄有四方自漢唐所無之事不遺小國即堯舜所用之心有執而有容得名必得夀臣日燇南荒坐井北面拱辰三十年犬馬拳拳一寸心天日皎皎俯陳金鑑徒懷金闕之瞻遙奉玉觴深望玉關之閉臣日燇謹齋沐親自撰寫萬夀頌一章填以金册封以金函差陪臣陶子竒等奉表稱賀以聞臣日燇無任瞻天望聖激切屛營之至誠歡誠忭頓首頓首謹言至元三十年三月初四日安南國臣陳日燇表安南國臣陳日燇謹昧死頓首百拜上言臣伏于今年一月十四日恭覩天使吏部尚書梁曽禮部郎中陳孚奉賫天詔俯臨下國臣日燇謹率宗族官吏奔走道路焚香迎迓及至褥道躬迎三熏百拜跪讀天詔曰汝國罪愆既已自陳朕復何言聖天子涵洪寬大如此臣日燇等不勝歡喜踴躍之至自謂數十年父子滔天之罪迄今日冰釋矣存者亡者均拜天地父母更生之賜中間諭以有生之類寧有長久安全者乎天下有不死之地乎臣日燇固知古今無不死之人天下無不死之地而所恃者有好生之天聖天子以天為心恤孤字小一視同仁則小國可以長久可以安全可以不死否則何往而非死地也天詔又曰徒以虛文嵗幣巧飾見欺于義安在臣日燇伏讀至此精神遐漂肝膽墮落雖生若死雖存若亡臣日燇此身不幸莫大既不能生于天子之朝又不能造于天子之庭其所以表誠者在乎土宜而已臣日燇豈不知聖朝天覆梯航萬方竒貢珍寶靡所不有初何以區區小國進獻為哉然臣日燇猶不顧其罪而復為是冒昧者誠為事君之義有不可廢也在天詔雖以為于義安在在臣下其敢廢職耶伏望皇帝陛下父母其心乾坤其量包荒含穢曲賜矜存念臣祖臣光炳赤心歸順忝受封册俾臣日燇襲恩供職修貢如故上以克盡事君之誠下以克成先祖之志豈惟微臣一介獲保茍延殘喘抑亦一方生靈同享天地好生之大德區區犬馬寸誠臣日燇自謂雖千生萬死粉骨碎身亦不足以圖報聖恩之萬一也臣日燇無任祈天叩聖昧死之至謹奏至元三十年三月初四日安南國臣陳日燇奏陳剛中詩集附録
