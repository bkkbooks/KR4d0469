body:
  text: 陳剛中詩集别集類四元提要臣等謹案陳剛中詩集三卷附録一卷元陳孚撰孚字剛中天台臨海人厯官奉直大夫台州路總管府治中事迹具元史本傳此集卷一題曰觀光稿乃至元中孚以布衣上大一統賦江浙行省聞於朝署上蔡書院山長考滿謁選京師時所作卷二題曰交州稿時至元二十九年世祖命梁曾以吏部尚書再使安南孚以翰林國史院編修官攝禮部郎中為副使往來道中所作卷三題曰玉堂稿皆孚官翰林日作案孚使安南回擢翰林待制仍兼國史院編修而稿中有翰苑薦為應奉文字二十韻謝大司徒併呈諸學士一首又有至元壬辰呈翰林請補外二首壬辰即使還之次年是前後官翰林所作均在此集也觀光交州二稿皆紀道路所經山川古迹蓋仿范成大使北諸詩而大致亦復相埓玉堂稿多舂容諧雅渢渢乎治世之音其上都紀行之作與前二稿工力相敵蓋摹繪土風最所留意矣附録一卷皆載諭安南詔安南謝罪表及孚與安南諸書考孚元書無傳其出使始末乃載梁曽傳中其時陳世燇不出郊迎又不延使自陽明中門入孚作三書責之辭直氣壯迄不辱命然傳不載其書詞此卷亦足補史闕也瞿宗吉歸田詩話曰鸚鵡洲有陳剛中一篇詞語跌宕議論老成誠佳作也又白門詩亦佳葉盛水東日記則曰詩與文稍異者以詩兼興趣有感慨調笑風流脫灑處如長詩落句翻空旁入作散場語是也然時一出奇耳前元詩人陳孚剛中集中歌行則全用此體觀者察之云云蓋宗吉舉其一兩篇而盛則核其全集故以自落窠臼為病雖推闡少苛要亦識微之論矣又陶宗儀輟耕録記孚少嘗為僧題詩於父執之壁父執知其欲歸俗因使養髮妻之以女其詩淺鄙其事亦不知有無小説多誣不盡可信集中不載顧嗣立元詩選初集乃録之補遺中殊失别擇今無取焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
