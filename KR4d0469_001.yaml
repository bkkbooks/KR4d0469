body:
  text: 陳剛中詩集卷一元陳孚撰觀光藁出門别親友停君漢水浮鴨之翠杓聴我嶧山栖鸞之綠桐男兒拂衣出門去龍泉三尺光如虹君不見磻溪鶴髮釣魚者偶擲漁竿来牧野白旄麾開炮烙烟桓圭朱芾侯青社又不見南陽臥龍人不識一朝佐漢坐很石羽扇輕摇蛇鳥驚火精焰焰天西極旗亭四月柳如藍紫騮嘶風黄金驂豈無叩牛歌亦有捫蝨談天生巉巖崒嵂骨蒿萊槁死誰能甘我欲登泰山扶笻欵天關東溟若木如可攀手弄日月青雲間我欲渡黄河赤脚凌秋波水仙樓閣銀嵳峩徑叱海若笞蛟鼉停君翠杓聴我緑桐真人開天六合同風騶虞鳳凰飛舞鎬宫有線五色獻于重瞳補舜衣裳山龍華蟲虎豹九關兮不可以達吾則脱冠歸来兮丹丘之青峯長揖二三子目送西征鴻拜辭先隴而行晨陟馬鬛封血淚如雨滴父兮曩即世宿草十改碧平生熊豹姿虬髯身七尺豈無千里心柰此驥伏櫪家有三萬卷手自校朱墨親傳不肖孤今亦字僅識名未成父志何以慰窀穸墓下當自誓素操堅鐵石過鏡湖鏡水八百里水光如鏡明偶尋古寺坐便有清風生天濶雁一㸃山空猿數聲老僧作茗供笑下孤舟輕越上早行青鞋三十里草露惹衣斑潮落曹娥渡雲昏夏禹山秋聲黄葉裏天影白鷗間欲問錢塘路漁家半掩關夜泊六和塔下碧天如幕垂露濕星磊磊漁燈射寒沙萬㸃亂光彩壯哉大江水浩浩東北滙西風捲潮来鐵馬擁萬鎧木落烟嶂横鴟夷魂安在臥聞黄帽郎一曲歌欵乃扣舷起和之逸興𣺌雲海鳳凰山浮屠百尺聳亭亭落日鴉啼野蔓青故國盡銷熊虎氣荒山空帶鳳凰形金根輦路迎禪駕玉樹歌臺語梵鈴惟有錢塘江上月年年隨雁過寒汀湖上感舊昔日珠樓擁翠鈿女墻猶在草芊芊東風第六橋邊柳不見黄鸝見杜鵑和靖墓北邙翁仲拱朱門玉椀時驚古帝魂誰似孤山一抔土梅花依舊月黄昏葛嶺行葛嶺相君之故居昔年甲第臨通衢錢横花間甃作徑錦鋪泉底流為渠後庭三千傾城姝歌舞絶世冰肌膚麒麟銀裳龍綃裾佩以文螺木難珠相君出擁萬虎士各操鬭㦸左右趨劒履上殿帝賜坐駞蹄七寳分御㕑望塵拜者頌元老伊尹周公所不如豈知一旦事瓦裂鋃鐺鐵鏁載以驢我偶過此訪廢址狐兔縱横草焦枯琨臺瑶砌不復見已有野人来種蔬却怪當時鑿隧道挾詐出入潛如狙大臣一身佩天下版墻複壁何謬歟山童從我一壺酒回首落日悲欷歔摩挲仆碑共踞坐尚是御賜淩烟圖飛来峯寒峯插天出玲瓏萬菡萏微風起松際怪石勢摇撼上有百尺松幽花綴紅糝野猿忽躍去滴下露千㸃回首冷泉亭天鏡光瀲瀲游姬長眉青嬌童兩髦髧平生山水癖如人嗜昌歜對此一壺酒玉色翻醉臉路逢老祝髮絳袍金光閃兹山信自佳恨為緇塵染置之且復醉天竺鼓紞紞嘉興有顧野王讀書堆燕子穿烟水荇開故家猶有讀書堆平生雙耳松風裏又向華亭聴鶴来簫鼓聲中十萬家垂楊淺映綠牕紗象梳兩兩蟬鬟女笑擁紅橋買藕花平江滄浪亭下望姑蘇千尺飛橋接太湖故里空傳吳稻蟹寒祠猶記晉蓴鱸芙蓉夜月開天鏡楊柳春風擁畫圖為問館娃歌舞處鸎花還似昔年無吳宫子夜歌紫貝樓闕鬱金香暖雲七十紅鴛鴦玉蟬笑擁霞綃裳星河不墮宫㸃長綠樽灧灧麟髓泣露重花寒秋不濕歈歌一聲驚怒濤海鯨夾陛如人立誰知淺顰蛾半掃中有疎螢滿愁沼越兵曉跨西風来碧波一夜芙蓉老吳松江長橋松江波萬頃橋倚碧雲端白鳥穿屏小青天落鏡寒夕陽明佛塔秋色老漁竿無限凭闌意何時此掛冠三髙祠君不見洛陽記室雙鬢皤不忍荆棘埋銅駞西風忽念鱸魚鱠歸来江上眠秋波又不見甫里先生心更苦河朔生靈半黄土夕陽蓑笠二頃田口誦羲黄思太古二君隠淪豈得已一生不及鴟夷子吳宫鹿走越山髙脱纓徑濯滄浪水丈夫此身繫乾坤豈甘便老菰蒲根古今得失一巵酒我欲起酹汀鷗魂常州毘陵城西漁火紅家家夜香燒碧空荻花離離季子塜楓葉索索春申宫雞聲人語三十里大船小船浪相倚鸂鶒一雙飛上天人在舵樓弄秋水京口昔日巍樓倚北門朱闌空鎖蒼苔痕金山風起水聲急鐵甕雨来雲氣昏仙杖無靈花已槁霸圖有恨石猶存漁舟只在滄浪上一笛夕陽愁客魂登北固樓北固閒迴首荒城夕照中烟光浮海濶天影入樓空星斗占吳分江河見禹功誰家兩翁仲無語立秋風金山寺萬頃天光俯可吞壺中别有小乾坤雲移塔影横江口潮送鐘聲過海門僧榻夜隨蛟室湧佛燈秋隔蜃樓昏年年只有中泠水不受人間一㸃塵𤓰洲烟際繫孤舟蘆花滿棹秋江空雙雁落天濶一星流急鼓西津渡殘燈北固樓商人茅店下沽酒話揚州真州淮海三千里天開錦繡鄉烟濃楊柳重風淡芰荷香翠户妝營妓紅橋税海商黄昏燈火閙塵麝撲衣裳金陵六代帝王州寒烟滿石頭星河天北轉江漢水東流步絶金蓮雨歌殘玉樹秋白頭有漁者猶説景陽樓鳳凰臺鳳凰臺上野烏啼笳鼓連營日又西天地無情潮寂寞英雄有恨黍髙低殘桁夜雨迷朱雀荒塜秋風怨白雞空有斷碑蒼蘚裏千年留得謫仙題臙脂井淚痕滴透綠苔香回首宫中已夕陽萬里山河天不管只留一井屬君王烏衣巷鳷鵲金波事已非江山何限淚沾衣臺空鳳去無人問只説尋常燕子飛雨華臺巍臺千尺梵王家雲淡秦淮月映沙天雨寳華今不見空聞人唱後庭花揚州千載殘城生亂莎夕陽吹角秋風多吳公臺下已黄土揚子橋頭空白波隔岸櫓聲桃葉渡滿樓燈影柳枝歌當年杜牧亦何意空向珠簾醉綺羅平山堂堂上醉翁仙去蘆花雪滿汀洲二十四橋烟水為誰流下揚州后土祠瓊花荒棘萋萋后土宫芳根已逐綵雲空男兒别有揚州淚不為瓊花滴曉風露筋廟白鳥飛空萬箭攢玉肌一夜粉痕乾殘碑何用誇筋露要露平生鐵肺肝髙郵軍吳通上國已千秋日日長淮送客舟一卷麟經孤燭下夜深無語過䢴溝文星已逐水西沉對客揮毫只此心今夜又遊臺上月不堪更照古藤隂萬頃波間寳氣浮晚来釃酒酹中流天明更欲凭闌望説與驪龍莫暗投甓社湖遇大風舊傳有夜光之珠天低烟㝠㝠平湖遶淮楚一帆東南来乃為風伯侮前如殘葉飄後如輕蝶舞驚濤湧雪山濕浪濺銀雨嘗聞貝宮胎夜夜靈光吐吾無盜睡心龍兮爾何怒舟師倚斷桅相戒不得語亦有誦咒者拱手面如土回視天際雁萬㸃落逺浦彼物何悠悠吾生浪自苦寳應縣關河魚沸血波流喜見元符下楚州宫壼明年翬翟掩為誰留得採桑鈎淮安州古淮隂郡孤帆下江北千里西風輕泊舟公路浦始見南昌亭青天下白露亂葉凄以聲汀洲結海色冉冉孤月生殘鴉感興廢斷腸悲飄零安得攜美酒臺上呼劉伶百年一箕踞六合皆螟蛉長淮有感一笛山陽上東風蜃氣腥烟迷隋帝柳潮湧楚王萍曉市堆淮白秋郊獵海青古今愁不盡落日蓼花汀淮隂侯廟漢家羅網政髙張誰有勲名紀太常戲爾築壇呼大將危乎操印立真王烟中草木疑殘幟沙上風濤憶故囊鐘室千年君莫怨未央宫殿已斜陽漂母塜英雄未遇亦堪羞一飯區區不自謀莫笑千金酬漂母漢家更有頡羮侯黄河謡長淮綠如苔飛下桐栢山黄河忽西来亂瀉長淮間馮夷鼓狂浪峥嶸雪崖墮驚起無支祁腥涎沃鐵鎖兩雄鬭不死大聲吼乾坤震撼山嶽骨磨蕩日月魂黄河無停時淮亦流不息東風吹海波萬里湧秋色秋色不可掃青烟暎蘆花白鳥亦四五長鳴下汀沙黄靈奠四瀆各剖盤古髓千載今合流神理胡乃爾漁翁一鬢霜扁舟依古樹隔浦欲扣之翩然淩波去清河口百年南北戰塵昏只指長淮作塞垣今日清河河上水天教洗眼看中原邳州沂水碧潺潺汀沙白鳥閒林邊郯子國烟際嶧陽山茅屋秋先破荒城夜不關烹魚呼濁酒一笑夕陽間圯橋履印青苔跡未消一編徑佐聖明朝祖龍流毒如洪水濟盡生靈是此橋白門邳之城南門吕布為老瞞圍急登此請降布死城南未足悲老瞞可是筭無遺不知别有三分者只在當時大耳兒古宿遷唐宿豫縣淮水東流古宿遷荒郊千里絶人烟征衣不脱夜無寐舟在西風亂荻邊月落狐鳴野草黄雁飛無數水茫茫數星鬼火寒沙上知是何年舊戰場吕梁洪沂泗之水来魯邦平沙千里流淙淙忽逢吕梁萬石硔勢與石鬭不肯降半天捲起千尺龍怒聲日夜相摏撞有如萬騎騰驪䮾左挾賁獲右羿逢惡若哮虎鼎可扛踴槊躍矢横矛鏦風雲蛇鳥萬旌幢大呼擊碎龍文杠死戰不復留空羫我生事業在北牕蒙莊一卷暎秋釭每羨老叟何其憃忠信出入言非哤及此更覺心悾悾西風吹衣衣茸尨茅店沽来酒盈缸篙人贈我尺鯉雙扣舷而歌和柷椌問禹何故留此洚何當理我小舽艭東浮溟海西岷江沛然一口吸老龎要使后土安鴻厖徐州項羽戲馬臺項王熊豹姿氣欲吞天下大呼渡河来山嶽如崩瓦當其火秦宫血湧渭水赭嗔目叱諸侯膽落毛髮洒誰知隂陵路浩歌淚如瀉惟徐乃故都昔此奠宗社尚想巖臺上鐵槊擁萬馬酒酣笳鼓鳴旌旗蔽原野及今亦何有荒棘秋滿把皇天祚真主神器不可假豈有時雨師刈人如土苴天亡君勿悲為君奠罍斚黄樓東坡所築長河如帶彭城東亂石蹴起百步洪昔年民歌山鞠藭孤城匯為河伯宫城上閃閃鯨鬛紅雪堂先生人中龍驚湍偃受丸泥封手援赤子魚腹中黄樓千尺雉堞雄巍梁畫棟光曨曨吹笙伐鼓撞歌鐘先生鏗然一枝笻麾斥八極綾星虹酒酣叱起楚重瞳為我㧞劒舞西風夘君作賦聲摩空至令讀者毛髮鬆百年事往猶飛鴻我獨流涕將何從孤角一聲烟濛濛又送落日沉西峯百步洪大山如飛虬小山如伏牛天河横空来聲撼山骨浮我偶石上眠夢驚霹靂怒急起扶瘦笻恐山亦流去范增墓七十衰翁兩鬢霜西来一笑火咸陽平生竒計無他事只勸鴻門殺漢王泗水落日漁歌何處白鷗雙墮蒼烟欲弔周家殘鼎秋風泗水千年燕子樓唐張建封妾盼盼之居也哀其節作長相思兩章長相思久别離東風不暖殘燕支乳鴉困柔鸞悲櫻桃泫紅膩蘼蕪凋緑滋牙床琥珀枕夢君君不知長相思久離别珠樓無人但有月翠屏寒銀燭歇芙蕖為誰憐丁香空自結淚滴錦䄡褕十年化為血出彭城北門千載金湯拱上流只今惟有荻花秋江南客子笑無語閒看黄河下汴州留侯廟子房王佐才其風凛冰雪天遣鶴髮翁圯上授寳訣博浪沙中千尺鐵祖龍未死膽已裂况此喑嗚扛鼎夫不直秋風一劒血談笑帷幄間六合雄雌决卯金四百年只在三寸舌但恨漢徳非姚虞不得身為古稷契雍熈至治如可作豈肯脱冠掛北闕留城古祠今千載碧蘚溜雨眼斷碣我恐至人或不死尚有笙鶴擁玉節酌泉採菊往奠之回首芒碭墮山月沛縣歌風臺沛宫一曲大風歌誰識尊前感慨多㧞木揚沙濉水上大風中有漢山河沛上風雲志未酬彭城先有錦衣遊同為富貴歸鄉者只是龍顔異沐猴原廟衣冠久已灰斷碑無首臥蒼苔至今風起雲飛夜猶想帝魂思沛来陵母墓太傅勲名半紙殘百年人子痛如山縁何方寸非徐庶忍死慈親一劒間魯橋濟州南六十里東魯三家市長橋壓怒濤寒沙秋一雁殘月夜千艘北極天形大中原地勢髙百年洙泗上今得浣征袍夜泊濟河十日淮沂上今朝渡濟河龜蒙秋燒濶鳬嶧夕陽多古寺雲籠塔長亭柳暎波魯邦無孔子何處聴絃歌題太白酒樓昔聞李太白山東飲酒有酒樓今我登樓来北風吹髮寒颼颼太白天酒仙人間不可留金光絳氣九萬里翩然而上騎赤虬左蹴大江濤右翻黄河流手攀北斗招摇柄瓊田倒瀉銀灣秋銀灣吸乾日月液蟾驚烏泣黄姑愁太白方悠然掀髯送汀鷗炯如曉霞一㸃暎秋水紅痕微湧玉色浮太虚變化如蜉蝣仙今何在不可求惟有胸中燦爛五色錦化為元氣包神州我欲起仙從之遊安得羽翮飛上崐崘丘東平府任宿須句國烟雲擁汶河長亭東接岱短棹北通阿萬井樓臺壯千郊衍沃多無鹽城突兀司𨽻石嵳峩夜月喧簫鼓春風扇綺羅鈿車香不掃步障錦相摩地尚雄千乗人猶慕四科故侯敦學校俊士樂絃歌紫闥懸金榜朱樓響玉珂自天沾湛露率土育菁莪衮冕明蟲藻樽罍列象犧淹中書在否稷下事如何沂詠難逢㸃鄒遷尚憶軻明朝燕趙去萬事付滄波望泰山扁舟浮泗来夜宿須句國眼明忽見玉芙蓉揷天亭亭千丈碧舟人為我言此乃七十二君之泰山天風吹落黄峴露冰花亂灑龜蒙間七十二君今何在寳符朝朝吐光彩千年老鶴巢雲松夜看白日湧東海東海青童仙踞龜啖蟹螯笑秦亭上攀蟠桃笑彼鞭石駕長橋天帝之孫奠天極鮑魚狂魄腥山色我有東封書中含萬古情欲奏天子甘泉殿手刻玉檢黄金繩寄聲為報牽狗老先向石壇種瑶草黄石公廟在東阿縣榖城南榖城黄石廟古木白雲深黄石有存沒素書無古今老耼三世夢孺子一生心日落祠門掩殘鴉又滿林管仲井在東阿縣畫野分民亂井田百王禮樂散寒烟平生一勺潢汙水不信東溟浪沃天聊城縣七國兵戈若沸羮詩書誰問魯諸生君看一紙聊城箭何似安平十萬兵髙唐州千里齊郊亦壯哉扶笻城上獨徘徊馬隨濟岱秋風去鴈帶關河夜月来驛路暎墻榆葉老漁村帶水荻花開吳儂誤讀襄王傳空向山東夢楚臺陵州五里行盡桑麻疇十里一見蘋花洲十里五里烏鳥樂隠隠烟火浮陵州陵州大船腹如鼓陵州梨棗賤如土陵州女郎金縷衣低鬟亂擁紅牕舞柳衣裊裊縈清河綠頭水禽飛帶波簫笙月下不肯飲一笑如此陵州何景州聊攝之東一千里昔為青社太公履只今但有無棣溝榆葉亂擁沙水流車行半夜草露濕路傍土堠如人立丁當鐸摇馬不驚黑天倒垂參昴星吾生百年浪自苦悲笳一聲殘月吐廣川大夫廟在景州北門俯察人情仰憲天素王心事策三篇大夫不向江都死換盡炎劉四百年義利從来界限殊大夫一語破昏愚平生最笑秋風客只愛黄金竈鬼書阜城縣唐帝失金鏡六合無光晶太微摇玉床影射攙搶星河朔彈丸地梟獍接踵生乾犖肉未寒復有史思明鬼馬載鬼妾氣薰草木腥天網何嘗漏瀦宫穿濕螢我闕過逆壤驅車無留行安得踏東海飛戈膾長鯨御莊百年禮樂卯金刀忍把鴻名冠偽朝樹上一聲休也曲路人猶自怨鴟梟獻州萬里天東北西風獨杖藜雁聲秋帶魏樹色曉浮齊野濶青烟淡天空白日低人家在何處隠隠野狐啼河間府北風河間道沙飛雲浩浩上有銜蘆不鳴之寒雁下有隕霜半死之秋草城外平波青黛光大魚跳波一尺長牧童吹笛楓葉裏疲牛倦馬眠夕陽有禽大如鶴紅喙摇緑烟路人指我語似是信天緣我生功名付樽酒衣如枯荷馬如狗為問天緣可信否旗亭擊劒寒蛟吼君子館牢落乾坤一腐儒征岐半世泣楊朱偶逢孤館呼君子夜起挑燈讀古書莫州晨出莫州門回望古易京丹樓不復見草白寒雉鳴雉角角棗纂纂昔誰城此公孫瓚城南城北陂水滿寒蒲如劒出水低大火焚巢天不管野鳬醉眠沙土暖吕仙翁廟山形夭矯蒼精劒日影曈曨紫磨丹度盡世人人不識午烟起處是邯鄲雄州燕南垂趙北際昔闕義城鐵可礪城上烽火明如彗只今殘堞黄雲曀老榆半枯懸薜荔市翁叱馬聲嘒嘒叩以瓦橋潛出涕英雄虎鬭空萬世北風吹沙秋鶴唳雄州白溝遼宋兵戈事已休昔年曾此割神州一衣帶水殘陽外猶有人言是白溝涿州晨發白溝河薄暮宿范陽殘城無雉堞枯木鳴白狼回首望中原日落烟茫茫天低鶻沒處彷彿見太行緬懐昭烈帝八尺鬚眉蒼平生漢社稷志欲為髙光惜哉不得就越在天一方里人亦何知牲酒奠樓桑車葢不復見但有秋草黄我来已千載誰復悲興亡天明登車去塵霧沾衣裳良鄉縣過盡長亭又短亭燕京初聴曉鐘聲呼童拂拭青藜杖早掛琴書上帝京詠神京八景太液秋風一鏡拭開秋萬頃碧天倒浸琉璃影寒飇夜捲雪波去貝闕珠宫黛光冷三千櫂歌摇綠烟濕鬟吹墮黄金蟬琪樹颼颼紅鯉躍衮龍正宴瑶池仙瓊島春隂一峯亭亭湧寒玉露花不墮瑶草綠珠樓千尺星漢間天飇吹下笙韶曲萬年枝上槲葉滿小鸞掁掁遶龍管金根曉御翠華来三十六宫碧雲暖居庸疊翠斷崖萬仞如削鐵鳥飛不度苔石裂嵯岈枯木無碧柯六月太隂飄急雪寒沙茫茫出關道駱駞夜吼黄雲老征鴻一聲起長空風吹草低山月小盧溝曉月長橋彎彎飲海鯨河水不濺冰峥嶸逺鷄數聲燈火杳殘蟾酒暎長庚横道上征車鐸聲急霜花如錢馬鬛濕忽驚沙際金影摇白鷗飛下黄蘆立西山晴雪凍雀無聲庭檜響冰花洒簷大如掌平明起視巖壑間揷天瓊瑶一千丈夕陽微漏光嵯峨倚欄闕爽氣多雲間落葉有徑否想見樵叟猶青蓑薊門飛雨黒雲如鴉漲川谷雷踴電躍風折木闕天萬闕海来森森暎牕如銀竹鳳城無數闕珠簾半捲西山秋誰憐羈客家萬里一燈孤擁寒衾愁玉泉垂虹雪波碧湧千崖髙落花㸃㸃浮寒瑶日斜忽奮五彩氣飛上太空横作橋古寺鐘殘塔鈴語回首前村猶急雨輕綃欲剪一幅秋又逐西風過南浦金臺夕照巍坡十二青雲梯老樹偃伏猶躬圭長裾已翳星辰去殘陽空掛盧溝西召南六百年宗社一日黄金重天下精纒寳氣夜不收又見殘霞明朔野陳剛中詩集卷一
