body:
  text: 陳剛中詩集卷二元陳孚撰交州藁出順承門又騎官馬過中原袖有芝泥御墨痕嶺海孤臣天咫尺五雲回首是都門過盧溝橋去天尺五禁城西華表亭亭柳拂堤海上飛来雙螮蝀雲間擁出萬狻猊太行山色浮鯨浪上國秋聲送馬蹄誰識太微天極象迢迢河漢玉繩低良鄉縣早行西風黄葉館曉起候鐘聲驛吏張燈送山童抱褥行短笻秋萬里長劒月三更猶有鈞天夢依稀遶禁城涿州乾坤萬里一征驂馬上彎弓膽氣酣回首太行青未了不知身在涿州南樓桑廟古廟千年後桑隂滿涿州亂山空北向大火已西流遺恨三分國英風百尺樓里人牲酒奠想像衮龍浮易州白雁飛殘水滿洲驛亭疎雨古槐秋平生最惡荆軻事手障西風過易州保定府聖明恩重一身輕英簜熒煌萬里行試問黄金臺上月清光此夜為誰明萬㸃寒鴉噪野烟保州城上夕陽天道傍苔碣麒麟臥知是誰家舊墓田中山府馬上秋雲擁節旄霜花如雪㸃征袍要留醒眼看天地不向山中飲濁醪定武蘭亭墮渺茫愚儒猶䕶篋中藏我来一笑無他語獨立西風看雁行真定懐古千里桑麻緑䕃城萬家燈火管絃清恒山北走見雲氣滹水西来聞雁聲主父故宫秋草合尉陀荒塚暮烟平開元寺下青苔石猶有當時舊姓名過滹沱河鉦鼓連天戰血紅存亡只寄寸冰中憑誰剪取鱗鱗碧畫作雲臺第一功宿趙州驛晉家曲沃舊池臺無數行人去又来可惜石橋三百尺只留驢跡印青苔攬轡欒城又趙州清霜㸃入鬢邊秋何如東院老尊宿不出山門到白頭望臺北道將軍鐵鏁開火旗萬陣渡河来君臣感㑹風雲際半在雲臺半望臺鄗南光武廟赤伏真天子𤣥圭衮藻明千年髙邑廟一笑下江兵野闊騰龍氣河流渡馬聲列侯冠劒合英采儼如生過臨洺驛大雨雪寒甚弭節發襄國飲馬清洺水山岳忽隂沍急雪白玼玼北風利如刀剪剪射雙耳飢烏時一鳴僕夫寒墮指人生三間茅豈不願鄉里天子命有行去去何敢已道傍有旗亭濕烟亂汀葦尚想布衾人晏眠猶未起邯鄲懐古數㸃寒峰擁翠嵐叢臺落日見漳南火枯襄子殘銅斗土蝕平原舊玉簪宫閉沙丘空有雀兵吞函谷已如蠶回仙逆旅今存否世上黄粱夢正酣磁州漳水東流繞碧灣風蒲獵獵夕陽間帽簷不奈黄塵滿賴有磁州數㸃山銅雀臺古臺百尺生野蒿昔誰築此當塗髙上有三千金步摇滿陵寒柏圍鳳綃西飛燕子東伯勞塵間泉下路迢迢龍帳銀筆紫檀槽怨入漳河翻夜濤人生過眼草上露白骨何由見歌舞獨不念漢家長陵一抔土玉柙珠襦鎖秋雨彰徳道中偶逐征鴻過鄴城譙樓鼓角晚連營雨垂魏武分香淚水湧周文演易聲林慮山髙秋靄濕湯隂里近夜燈明誰人得似韓忠獻鄉社猶誇晝錦榮羑里歌若有人兮羑里𤣥端兮玉几昔炮烙兮將纍以死今閟宫兮百世紀望糟丘兮朝歌彼罔有悛兮柰何横流汙兮滂沱河有龍兮洛有龜藐余繇兮明夷人弗問兮上帝臨之帝獨闕兮漳之渚水曾波兮神靈雨已矣乎文不在兹兮使我心苦淇州聨鑣下淇澳烟淡草紛紛綠竹已秋色白旄空暮雲殘陽孟津渡落葉比干墳尚想鷹揚叟當年此策勲衛州衛國多君子郊原景尚雄舟行淇水上人在邶風中酒不荒商邑琴猶記楚宫孟津在何處無語對征鴻黄河按此詩已見卷一題為出彭城北門千載金湯擁上流只今惟有荻花秋江南客子笑無語閒看黄河遶汴州博浪沙一擊車中膽氣髙祖龍社稷已驚摇如何十二金人外猶有民間鐵未銷汴梁龍徳故基書来海上勸連兵已見金輪逐火精醮絶絳樓無鶴唳朝空丹扆有狐鳴羽袍士尚傳三洞介幘人誰報六更一代興亡真大夢陳橋驛畔見青城登大相國寺資聖閣大相國閣天下雄天梯縹緲淩虚空三千歌吹燈火上五百纓縵烟雲中洛汭已掩西墜日漢津空送南飛鴻闌干倚遍忽歸去颯颯兩鬢生秋風石假山晨遊大梁圻涕泗不可忍道間萬崔嵬揷天湧蒼筍尚想吳震澤巨斧斸嶙峋東南赤子脂已逐枯蘚盡峨峨神霄君瑶鐘擁鴉闕摩挲太古姿在貫右宗稹維國建宫室天球樹靈簨胡為黑鬅鬙羅此亂蛟蜃事往不必議隂雨洗殘燐囘首丹鳳門古槐葉黄隕朱仙驛城郭重来事已非南薰不掩柳依依舊時大慶蒼虬礎留與田家夜搗衣鄢陵鄢陵昔搆兵萬騎夜流血一矢忽飛来射落楚山月哀哉公子側戰骨當速朽胡為三日榖易此半樽酒我今不飲酒但飲落月光晉楚杳何處雉鳴烟茫茫上蔡縣驛上蔡城邊雉兎肥滿川桑棗綠成圍東門牽犬無窮樂誰遣君侯不早歸幽贊神明象數開要從混沌見胚胎人間别有蓍龜在休問荒城八卦臺蔡州君不見蔡州城下三尺雪緋衣小兒二尺鐵汝水鱗鱗蒼瓠懸不洗逆雛襟上血吏部落筆走風雨穹碑清廟生民語顓臾乃在邦域中君誅一臣何足詡乾坤萬世開皇元天戈一指清中原方將泥金泰山頂殘灰豈問幽蘭軒蔡州至馬鄉遇大雪有作北風一夜聲洶洶大地吹如銀浪湧古槐夹道萬玉虬向人夭矯欲飛動蔡州昔讀昌黎碑疾馳文城見真勇我今躍馬蹴瑶瓊馬􅉵長嘶耳雙聳平生凛凛鐵石心意行萬里無關隴膚爪皴裂豈復問政要嵗寒報天寵回頭却笑鶴髮翁地爐如蝟縮擁腫鶴髮翁謂交趾老使臣也黄州黄陂驛晨發定逺驛千崖紅櫟林午度大勝關萬壑青松隂寒泉瀉澎湃亂石懸崎崟呦呦走野鹿角角鳴山禽平生一兩屐若有山水淫天台鴈蕩路坐對清猿吟朅来擁使節躍馬聲駸駸誰知長淮上風露凝衣襟黄州𣺌何處雪堂蒼烟深因思蘇長公幅巾霜滿簪洞簫起月下天地皆清音千載豈云逺知我猶此心陽羅堡歌陽羅殘堡髙巑岏亂山勢如秋蛇蟠長江西来五千里雪濤怒濺秋風寒憶昔王師駐江上旌旗百萬騰龍鸞江神俛首不敢喘鏡平河碧無驚湍乾坤一統自此始坐見北極朝衣冠我来蘄黄望夏口彷彿但認烟波竿漁鼓數聲起何處白鳥飛盡青天寛鯶公盈尺不論價翛然一笑生清歡興亡往事誰復問磯頭石老蒼苔乾津鼓急催渡江去又見曉日浮晴巒黄鶴樓歌嶪嶪乎黄鶴之樓兮突起乎天之東南吾不知其㡬百尺兮踞石磴而仰望眩金碧之耽耽手捫星漢如可近但見天飇吹髮寒鬖鬖瞿唐三峽之波濤洶湧訇擊而下兮雷聲怒撼于江潭忽遶城以北匯淨若萬頃之清藍楚山數㸃鸞騰蛟躍兮碧影倒浸乎烟嵐殘霞似落未落兮蒲獵獵以風偃柳裊裊以露含武昌亭臺一千萬瓦光參差浮楩楠下視十二之衢兮炫服士女東西行者藐蠕蠕之吳蠶黄鶴之仙人霓冠青瑶簮御綘旌于列缺倒景兮偶見我以大笑欲駐我之征驂攀東溟之博羅曜折西極之優鉢曇飲我以蒲萄鴨頭之綠兮侑以洞庭之蒼柑洞庭帝子鼓軒轅之瑟兮舞干戚而撞宫函白也挾赤鯨以旁睨崔顥怩縮而不敢以談浩浩乎萬丈之氣兮長虹横空夭矯而方酣下蟠黄之輿上斡𤣥之堪安得挽招摇以酌元氣兮妙太極而函三慨彼在昔如焚如惔陶司馬之狂悖庾大令之貪惏鸚鵡之洲何罪而戮赤壁之磯何功而戡吾豈若二三子斵崑崙之璞兮輕蹈夫太阿之鐔飛来兮黄鶴跨汝從兮彭耼鄂渚晚眺黄鶴樓前木葉黄白雲飛盡雁茫茫櫓聲摇月歸巫峽燈影隨潮過漢陽庾令有塵汙簡冊禰生無土葢文章闌干只有當年柳留與行人記武昌鸚鵡洲大江東南来孤洲屹枯蘚中有千載人殘骨寄偃蹇貽漢黨錮􅀈薦紳半摧殄况復啖葛奴盡使羽翼翦天乎鸞鳳姿乃此侣猰犬想當落筆時酒酣玉色洗鸚鵡何足詠僅以雕蟲顯我来策蓬顆清淚悽以泫尚悵迷㡬先不為無道卷賢哉龎徳公一犁老襄峴吕仙亭昔日吕公遊洞庭玉簫吹裂蘆花汀秋空一劒忽飛去夜月千山烟㝠㝠天地茫茫烏兎急波濤洶洶蛟螭腥起呼老樹欲與語濕露亂洒苔痕青岳陽樓洞庭木葉風颼颼雪浪萬頃飛白鷗氣浸中天日月濕影摇大地山河浮數聲裂玉洞賔魄一㸃殘黛湘娥愁安得天瓢酌仙酒跨鯨直上扶桑洲潭州百萬人家簇綺羅叢祠無數舞婆娑山盤衡嶽樹林密水落洞庭鳬雁多染竹痕深湘女淚佩蘭聲斷楚囚歌洛陽年少胡為者不奈承塵鵩鳥何瀟湘八景洞庭秋月月明水無痕冷光泫清露微風一披拂金影散無數天地青茫茫白者獨有鷺鷺去月不摇一鏡湛如故烟寺晚鐘山深不見寺藤隂鏁修竹忽聞疎鐘聲白雲滿空谷老僧汲水歸松露墮衣綠鐘殘寺門掩山鳥自争宿江天暮雪長空捲玉花汀洲白浩浩雁影不復見千崕暮如曉漁翁寒欲歸不記巴陵道坐睡船自流雲深一蓑小瀟湘夜雨昭潭黑雲起橘洲風捲沙亂雨灑篷急驚墮檣上鴉黿鼉互出沒暗浪鳴艣牙漁燈半明滅濕光穿蘆花平沙落雁十里黄晶熒菰蒲暎原隰亂鴻忽何来影墜西風急嘹唳三數行欲起又飛立水寒夜無人離離爪痕濕逺浦歸帆日落牛羊歸渡頭動津鼓烟昏不見人隠隠數聲櫓水波忽驚摇大魚亂跳舞北風一何勁帆飛過南浦山市晴嵐茅屋八九家小橋跨流水市上何所有寒蒲縛江鯉犬吠樵翁歸家家釡烟起共喜宿雨收霞明亂山紫漁村返照雨来湘山昏雨過湘水滿夕陽一縷紅醉眠草茵暖漁罾曬石上腥風吹不斷野鳬沉更浮沙汀荻芽短衡州千里山逢十里平巍樓突兀見澄清州依岣嶁屏邊住人在瀟湘畫裏行海雁飛回秋渚影江豚吹老夜濤聲何時得似龎居士一鉢空門了此生永州燒痕慘澹帶昏鴉數盡寒梅未見花回雁峰南三百里捕蛇説裏數千家澄江遶郭聞漁唱怪石堆庭見吏衙昔日愚溪何自苦永州猶未是天涯湘山寺無量夀佛大地山河無非佛者此為真身孰則為假滔淊清湘瑶影如瀉一草一木亦皆瀟洒月明露寒綠烟浮野山禽澗鹿悉談般若我来自北金鞍鐵馬一笑石上得清浄捨巍乎梵宫朱門碧瓦彈指毗盧風斯在下盤石山懸崖千仞鐵崔嵬勢似飛虬捲海来我見只疑山欲躍馬蹄不敢蹴青苔全州城郭依稀小畫圖佛光迥照鐵浮屠斑斕歸洞見盤瓠格磔滿林聞鷓鴣闕北吞雙練急湘山南聳一螺孤停鞭欲問炎州事闕侏離見矮奴靈川縣觀桂林山碧波洗出萬雲鬟闕滿殘陽紫翠間三世眼根修得到天教盡見桂州山馬王閣千山萬山紫翠芒巍閣突起山中央煜煜金身兜率佛稜稜鐵面扶風王烟雲浮動貔虎氣日月飛遶狻猊光回望交州渺何處孤鳶跕跕南海黄七星山𤣥元樓棲霞之洞懸崖插天千尺餘下有靈穴呀空虛勢如瑶宫聳渠渠菡蓞浮動金芙蕖想當未判混沌初元氣旁魄不得舒鬼斧鑿裂蒼﨑嶇要令吞吐如蟾蜍浩浩大海東南瀦洪濤蕩激痕未除白乳滴結色雪如伏翼倒懸啄瓊琚滿洞雲烟誰所嘘冷翠撲人濕衣裾直疑竅通崐崘墟十二玉樓鈞天居日華月華佩璠璵天丁夾侍黄金輿飜然而下騎鯨魚流鈴佀有聲虚徐平生嗜山如猿狙南窮衡嶽北醫閭數年侍直承明廬章服政爾祠鶢鶋今朝偶捧紫泥書雕題鴂舌開象胥見山忽覺形蘧蘧三世熱惱為之舒手攀古藤倚栟櫚天風吹鬢寒蕭疎山僧留我羮野蔬問我何時返樵漁人生六合一土苴胡能戚施與蘧篨有江可釣田可畬便當箬笠隨舂鋤冠卿何人墮泥淤郡邑鞭背生蟲蛆日之夕矣吾歸歟欲歸更為山躊躇題水月洞鐵崖萬仞鬼斧所鑿長嘯一聲白雲驚躍自永福縣過八十里山下山如井上如梯亂石嵯岈割馬蹄正是行人行不得鷓鴣更在隔林蹄馬平謁柳侯廟詞華一代日星尊茶臼村童儼尚存山左竟令驅厲鬼庭中已悔乞天孫善和里隔生前淚文惠祠封死後魂欲奠荔蕉不知處滿池榕葉擁朱門賔州賔州大如斗青林掩蒼靄亂石熊豹蹲纍纍漱江瀨野嫗碧裙襦聚虚擁野外青篛羅米鹽飄飄雙繡帶日晚投古驛酸風不可奈綠竹亂生枝離披影如葢瘴雨飛為塵鵂鶹聲噦噦府僚跪庭前對我各一慨濁酒强為飲旅魂那可醉故園何日還白雲遶吳會過牂牁江青草風吹毒霧腥交州何闕海溟溟牂牁已恨天涯逺又過牂牁二十程過邕州崐崘關昨日過大林關酸烟毒霧山復山今日過崐崘關寒泉怒瀉聲潺潺道傍榕樹齊如織千柯萬葉巗崖間怪藤倒懸一百尺霜雪不剥皮堅頑勢如蛟螭夭矯下絶壑駐馬側視不敢攀闕忽何来眼閃電光尾彎彎山童驚顫髮卓竪勸我急勒金鞍還因思狄天使貔貅夜度摧狂蠻上元燈火杳何處至今野燒痕斕斑我雖一書生袖有青絲綸誓将報天子肯避路險艱邕州南征士三萬鐵甲未解寒痌瘝我身七尺不能勇金符正爾羞蒼顔鐵鞭一揮出關去孔雀飛下滄江灣邕州左江南下一千里中有交州墮鳶水右江西遶特磨来鰐魚夜吼聲如雷兩江合流抱邕管暮冬氣候三春暖家家榕樹青不凋桃李亂開野花滿蝮蛇掛屋晚風急熱霧如湯濺衣濕萬人塜上蛋子眠三公亭下蛟人泣驛吏煎茶茱萸濃檳榔口吐猩血紅颯然毛竅汗為雨病骨似覺收竒功平生所持一忠壯荒嶠何殊玉階上明年歸泛兩江船會酌清波洗炎瘴江州在谿洞司馬琵琶昔日歌天涯流落事如何若行今日江州路應是青衫淚更多老母越南垂白髮病妻燕北寄黄昏瘴烟蠻雨交州客三處相思一夢魂度三花嶺絶壁三千丈荒烟八九家黄茅青草瘴黑質白章蛇橄欖髙懸子芭蕉倒吐花嶺頭一回首何處是京華思明州元日去年元日步瀛洲獸舞天墀拜冕旒山驛今朝一樽酒微臣身在嶺南州三雛掌上玉娉婷拂曉嘔啞語到明今日亂山孤枕上耳邊忽似有啼聲思明州風吹蠻雨滴芭蕉杵臼敲殘夜寂寥留得孤燈床榻畔思明州裏過元宵手捧檳榔染蛤灰峒中婦女趂墟来蓬頭赤脚無鉛粉只有風吹錦帶開鹿酒香濃犬彘肥黄茅岡上紙錢飛一聲鼔絶長鎗立又是蠻巫祭鬼歸毒蟲含弩滿汀沙荒草深眠十丈蛇遥望天邊紅似火瘴雲飛落木棉花刺竹叢叢苦筍生山禽無數不知名元宵已似春深後龍眼花開蛤蚧鳴度摩雲嶺至思凌州嵳峩摩雲嶺石壁如梯遶天頂千年毒瘴鬱不消怒入老楓結丹癭蒼莽思凌州懸厓結屋如蜃樓寨門半掩刀槊健隠隠雲際聞鳴牛蠻獠下山健如虎口紅如血面如土手捧椰漿跪馬前山虺水蟲間肴俎對此停鞭空自慨吾獨何為在荒裔他年周京王會圖願借丹青寫椎髻祿州遇大風岩壑驚摇木樹摧滿空苦霧捲塵埃黑風鬼國漂流去赤縣神州夢寐回病馬不嘶毛似蝟征夫相對面如灰夜深不解征衣睡况有翻盆急雨来交趾境丘温縣九月出薊門北風吹雪衣裘温正月至交趾赤日燒空汗如水天涯海角茫茫路馬蹄聲裏光隂度萬里長空一飛絮飄飄知復墮何處夜瞻天極思鬱結臣身南嶠心北闕願頌聖皇如天福早見塗山班萬玉二月三日宿丘温驛見新月正在天心衆各驚異因詩以記之至元癸巳春二月三日夕陳子使交州弭節丘温驛雲開林影明出門看月色但見天中間彎彎貼半璧同行二三子相顧各太息中原月初生去地纔數尺今胡翹首望月乃在東北神禹奠九州維此實異域𤣥象尚爾殊禮義何由識太息不能寐風動松露滴亂星不知名纍纍擁南極交趾支陵驛即事六轡南驅下寳臺交州正月已青梅富良江湧瘴雲濕安化橋昏蠻雨来蝙蝠穿林紅似燄蜈蚣浮海黑如堆防風猶後塗山會終為生靈結禍胎寳臺交趾山名交趾朝地驛即事帝徳堯同大山河共一天璽書行萬里銅柱又千年赤幟明雲際烏衣拜馬前舞階干羽在未必賴樓船交趾橋市驛戲作藥名詩長空青茫茫大澤瀉月色使君子何来山椒逺于役虎狼毒草叢淚如鉛水滴更苦參與商骨肉桂海隔問天何當歸天南星漢白入安南以官事未了絶不作詩清明日感事因集句成十絶奉呈貢父尚書并示世子及諸大夫篇篇見寒食拜掃歸来走鈿車杜牧二年寒食住京華胡曾自憐慣識金蓮燭歐陽修奉使虚隨八月槎杜甫回首扶桑銅柱標胡曾芙蓉帳煖度春宵白居易清明寒食誰家哭白居易折㦸沉沙鐵未銷杜牧關山迢遞古交州李郢物換星移幾度秋王勃微雨微風寒食節裴廷裕夷歌銅鼓不勝愁陳羽殘花悵望近人開杜甫不盡長江滚滚来杜甫寒食清明都過了參寥子鷓鴣飛上越王臺李紳台州地濶海㝠㝠社甫人踏金鰲背上行楊蟠獨在異鄉為異客王維無花無酒過清明魏野慈母年髙鶴髮埀石介鄉書無雁到家遲許渾初過寒食一百六白居易一日思親十二時山谷共藉梨花作寒食東坡孟光舉案與眉齊東坡越裳翡翠無消息杜甫夜合花開日又西白居易寒食家家出古城王建滿川風雨看潮生石曼卿八千里外飄零客白居易起向朱櫻樹下行張籍一百五日寒食雨山谷風光别我苦吟身賈島尚書氣與秋天杳杜甫同是天涯淪落人白居易海客乘槎上紫氛李商隱清明時節雨紛紛杜牧虎牙銅柱皆傾側杜甫水盡天南不見雲李太白安南即事聖徳天無外恩光燭海隅遂頒南越詔載命北門儒萬里秋持節千軍夜執殳前驅嚴弩矢後爨擁樵蘇睠彼交州域初為漢氏區樓船征既克徴側叛還誅五代頽王紐諸方裂霸圖遂令風氣隔頓覺版章殊丁璉前猖獗黎桓後覬覦一朝陳業搆八葉李宗徂安南本漢交州唐立都䕶府梁貞明中土豪田承美據其地楊延藝結洪吳昌岌昌文互相争襲宋乾徳初丁公著之子部領立傳子璉璿大將黎桓簒之桓子至忠又為李公藴所簒公藴徳政日尊乾徳楊煥天祚龍翰昊旵凡八傳至宋嘉定乙酉嵗陳氏始奪其國陳本閹人有陳京者偽謚文王壻于李值龍翰昏耄不恤政事京與弟本偽謚康王盜國柄昊旵沖幼其子承簒立僭號太上皇死子光炳嗣在宋名威晃上表内附國朝封為安南王死子日烜立在宋名日照死今日燇代領其衆於是有國六十九年矣下俗澆浮甚中華禮樂無諱嫌訛氏阮托制僭稱孤國諱李字姓李者皆易以阮臨文為字不成以父死自稱孤子表疏文移及對其羣臣皆然祭祀宗祊絶婚姻族屬汙雖有寢廟無嵗時祀禮惟供佛最謹國族男女與同姓為婚互相匹偶以齒不以昭穆今酋之妻其叔興道女也葢竊國闕懲創而然尊卑雙跣足老幼一圓顱民皆徒跣間有躡革履至殿則去之郊迎之際袍笏百人皆跣而已男子悉髠有官則以青巾幂之民悉僧也陟嶠輕於鹿泅波疾似鳬足皮厚甚登山如飛芒刺悉無所懼父子男女同川而浴冬夏皆然善水有潛行數百里者斜鈎青繒帽曲領黑羅襦巾色深青髹繒為之貫額以鐵線前髙一尺而屈之及頸以帶束反結其後頂有鐵鈎有職掌則加帶于鈎家居囚首見客乃巾逺行則一人捧巾以從惟首髻以皂羅包束逺望如道家綸巾而益廣出其旁髮皆露闕皆衣黑皂衫四裾盤領以羅為之婦人亦黑衣但白裏廣出就以縁其領博四寸以此為異青紅黄紫諸色絶無語笑堂前燕趨蹌屋上烏語音侏離謂天曰勃未地曰烟日曰扶勃未月曰勃义風曰教雲曰闕山曰幹隈水曰掠眼曰未口曰皿父曰吒母曰娜男子曰干女曰于多葢夫曰重妻曰陀被好曰領不好曰張領大率類此聲急而浮大似鳥語趨進輕佻往来如風深黑一色如寒鴉萬㸃抵鴉身偃豕羅我背拳狐其舁人用布一疋長丈餘以圓木二各長五寸挈布兩端更以繩挈圓木上以大竹貫繩兩人舁之人側其中若舉羊豕然名曰抵鴉貴者則以錦帛扛用黑漆上拖黑油紙屋髙四尺許鋭其脊而廣其簷簷廣約四尺雨則張之晴則撤屋而用傘酋出入以紅輦朱屏八人舁之甚麗象背上拖鞍轡凡座名曰羅我人坐其上拳屈如狐象頷編鈴數十行則琅琅然寺號千齡陋州名萬劫愚使者館于太師府左有小刹曰天啓千齡寺前有碑載建中八年壬辰嵗造乃其祖僭號為母李氏追悼㝠福李氏偽謚慈順太后龍翰女也偽興道王陳峻據萬刼府即唐浪州馬援駐兵浪西里地甚重佛故州名曰萬刼笙簫圍醜妓牢醴祀淫巫嘗宴于其集賢殿男優女倡各十人皆地坐有琵琶􅌙筝三絃之屬其謳與絃索相和歌則先哩㖮而後詞殿下有踢闕上竿杖頭傀儡又有錦袴裸其上體跳擲號呶婦人赤脚十指爪槎枒起舞醜態百出人家門首必有小祠其神曰馬夫人刻木象猥惡不可名狀朔望則陳于庭老稚羅拜之國尉青盤䕶軍掫白梃驅當國二人其叔偽太師陳啟弟偽太尉陳曄國事巨細曄啟皆専之毎至殿門下輿則二人各執二大木圓如鏡色青廣六尺上畫日月北斗二十八宿意以自障也毎州縣有官曰將掫司巡徼之事兼領土兵有警則盡驅丁壯以往器械悉自備無弓矢惟持闕亦有操白梃者閲條親獄訟明字掌機樞官自司尉而下有檢法明字皆執政官今丁公文杜國器黎克復等為之次有尚書亞卿翰林奉㫖判首三司又有閲條則親法令刑獄其族有昭明興道昭懐昭文佐天皆僭王號正月四日椎牛饗其官屬以七月十五日為大節人家相問遺官屬各以一口獻其酋十六日開宴酬之勃窣官中客鬅鬙座上奴奴皆涅其額有曰官中客則官奴也曰座上奴則可至酋左右餘皆白臺章中贊糾邑賦大僚輸置御史臺中贊即中丞也刑法酷甚盜及逃亡斮手足指其人甘心或付象蹴殺之國有大鐘樓民訴事扣鐘州設安撫通判縣有大僚箕斂煩重魚蝦蔬果悉以充斂皆大僚主之吏榷㯽榔税人收安息租産檳榔最多其税亦重専立官榷之安息木取其津及葉揉為小團大數寸嵗收租利甚厚然與西域安息不類黄金刑莫贖紫葢律難踰民間金銀雖銖兩悉徴送官有私服用者罪死官品崇卑視傘為差卿相則用三青傘次二傘一傘若紫傘惟親族用之他人不敢用安化橋危矣明靈閣岌乎自館行六十里過安化橋復一里至清化橋北其上為屋十九間至酋所其門曰陽明門上有閣曰朝天閣左小門曰日新門右小門曰雲會門門内天井廣深數十丈升自阼階閣下扁曰集賢殿上有大閣曰明靈閣道右廡至大殿曰徳輝殿左門曰同樂門右門曰橋應門其扁皆金書曲歌歎時世樂奏入皇都男子十餘人皆裸上體聨臂頓足環繞而歌久之各行一人舉手則十數人皆舉手垂手亦然其歌有莊周夢蝶白樂天母别子韋生玉簫踏歌浩歌等曲惟歎時世最愴惋然漫不可曉大宴殿上大樂則奏于廡下之後樂器及人皆不見毎酌酒則大呼曰樂奏某曲廡下諾而奏之其曲曰降黄龍曰入皇都曰宴瑶池曰一江風音調亦近古但短促耳龍蘂常穿壁蔞藤不離盂以龍花蕊和安息香油揉為小鋌如筯長尺許挿壁上然之終日不絶香甚清馥閩廣人檳榔皆啗乾者以蔞藤石灰和之交人惟啖軟檳榔取新採嫩者以蔞葉二寸塗蜆灰裹而食貴者以黄銀榼僮攜之不離左右終日咀嚼不少休玳簪穿短髮蟲紐刻頑膚婦人斷髮留三寸束于頂上闕其杪再束如筆無後鬢鬟亦無膏沐環珥之屬富者玳瑁珥餘骨角而已錙銖金珠無有也人皆文身為鈎連屈之文如古銅爐鼎欵識又有涅字于胸曰義以捐軀形於報國雖酋子姪亦然有室皆穿竇無床不尚爐屋無折架法自棟至簷直峻如傾棟雖至髙簷僅四五尺又有低者故欲黑暗則就地開牕如狗竇然人用蒲席地坐而向明睡榻之側必有爐熾炭盛暑亦然以辟濕蒸之氣星華舟作市花福水為郛星華府即唐驩州去交州城二百餘里海外諸畨舟航輻輳就舟上為市甚盛酋叔昭文祖廟與其重寳皆在實大鎮也交州無城壁土墻睥睨而已西有花福州以水圍遶前有莫橋西陽麻他老邊四橋以通出入突兀山分臘汪茫浪注瀘其國西面皆山惟寄狼寳臺佛跡馬鞍於境内為髙西南善汝縣有赤土山萬仞挿天將數百闕南柵江以筏渡行四十里至富良江水湍急不甚闊江之南名橋市居民頗衆又四十四里曰歸化江一曰瀘江闊與漠鄂等江自大理西下東南入于海即諸葛武侯渡瀘之下流也有四津潮汐不常䑕關林翳密狼塞澗縈紆丘温東南行十數里陟岡度嶺西山行兩山間初所見黄茅修竹既而深林闕水深不盈尺然周遭百折或百步一涉或半里一涉凡六七十復度一嶺夹道皆古木蒼藤有巨石挺出篁竹叢薄最為嶮名老䑕關西行有山峯秀峙緜亘不絶是為寄狼山翠壁蒼崖異木翳密鸚鵡孔雀飛鳴互答猿猱無數凡三十里抵刺竹關下有兵守之關上兩山相交僅通鳥道大竹皆圍二尺上有芒刺葢其國控扼之地也士燮祠將壓髙駢塔未蕪吳士燮蒼梧人兄弟四人一為合浦太守一為九真一為南海士燮為交趾太守有恵政死𦵏焉土人祠之甚厚謹髙駢既定交州遂於富良江上橋市之左立石塔巋然猶存鐵船波影見銅柱土痕枯馬援征徴側造鐵船四隻沉于海今水清猶彷彿可見銅柱援所立也在乾地舖其刻有云銅柱折交人滅今陳日烜以土埋之上建伏波祠墟落多施榻巔崖屢變途村落有墟毎二日一集百貨萃焉五里則建屋三間四面置榻以為聚墟之所使臣至其國不復行舊徑皆鑿山開道縈迴跋涉意以示險逺也千艘商斥鹵四穫粒膏腴國無儲蓄惟恃舟闕賈販稻嵗四斂雖隆冬苗芃芃然短短桑苗圃叢叢竹刺衢桑以椹逐年闕以供蠶毎家無牆垣竹籬環之刺竹大者徑七八寸刺堅如鐵斷而挿之則活牛蕉垂似劔龍荔綴如珠芭蕉極大者冬不凋中抽一榦節節有花花重則榦為所墜結實下垂一穂數十枚長數寸如肥皂去皮軟爛如綠柿極甘冷一名牛蕉龍荔實如小荔枝味如龍眼木與葉亦相似一菓古名竒菓有波羅密大如瓠膚礧砢如佛髻味絶甘人面子肉甘酸核兩目口鼻皆具又有椰子盧都子餘甘子皆珍味可食寳斚羅鸚鵡名香屑鷓鴣鸚鵡螺色紅如雲母形嘴翅似鸚鵡故名香材最多水沈栴檀亦有之似鷓鴣斑者為貴掲旌圖鬼像擊柝聚兵徒旌旗黄黑青紅簇色四脚中畫星官天神或如羅刹之狀呼集儔類則以大竹截為筒叩之雖逺亦聞鼻飲如瓴甋頭飛似轆轤習以鼻飲如牛然酒或以小管吸之峒民頭有能飛者以兩耳為翼夜飛往海際拾魚蝦而食曉復歸身完如故但頸下有痕如紅線耳蚺皮為鼓擊蝦鬛作笻扶蚺蛇大者如合抱之木長稱之腊其皮刮去鱗以鞔鼓面闊數尺但用背皮腹皮不與也向明視之黑質白華章如方勝交人樂以為前列巨蝦大如柱鬚有七八尺長者海濵之人以為拄杖甚佳家必烹蛇虺人能幻虎軀山蛇水虺乃其常膳間以充脯醢峒民有妖術誦咒脩煉則幻形為虎搏獐鹿生啗之然不常有也魚鱗簷粲瓦鵲尾海浮桴瓦形如板上正方而鋭其下之半如古圭然横半竹以為棧以竹釘釘其瓦于棧上自簷以次相壓至屋脊宛如魚鱗舟輕而長板甚薄尾如鴛鴦之翅兩旁翹起操以三十卒多有至百人者其疾如飛水弩含沙擲山㺑出穴麄水弩一曰含沙射工以氣射三十步射中其影但覺紅痒即以刀抉去肉不爾必死大率毒蟲毒藥廣以南多有之中州人至此不善寳䕶必為所害山㺑一曰山都多在大木為巢或居巖穴獨足跳躑能眩惑人葢山鬼水怪類云鰐魚鳴霹靂蜃氣吐浮屠鰐魚大者三四丈四足似守官黄色脩尾口森鋸齒一名忽雷其聲如霹靂鹿走崖上聞其嘷吼則怖而墜多為鰐所啗海中大魚多有之惟海鰌最偉小者亦數千尺吞舟之説非虚也蜃於春夏間吐氣蔽天如樓臺宫室亦有如七級塔者人往往見之㝢縣傷分阻生靈困毒痡舞階猶未格折簡豈能呼大社初傳禡轅門合受俘貔貅微偃戢蛇豕偶逃逋天已殖渠惡民猶奉僭雛勢如純據隴政似皓亡吳鳳札重宣令狼心更伏辜幸能寛斧鑕猶自戀泥塗獻頌尊天子騰章遣大夫象鞮言可訂蠧冊事非誣功欲收邊徼威須仗廟謨沐薰陳此什禮部小臣孚交趾偽少保國相丁公文以詩餞行因次韻使星飛下擁祥烟不憚﨑嶇路九千雙袖拂開南海瘴一聲喝破下乗禪妙齡已出終軍上英論髙居陸賈前歸到朝端須為説逺氓日夜祝堯年一雨隨車洗瘴烟大鵬還擊水三千南来未了維摩病北渡空思達磨禪使節㝷常銅柱外天威咫尺玉階前臨岐握手無他祝留取忠貞照暮年老䑕關春風又送使旌還笑掬清波洗瘴顔從此定知身不死生前先過鬼門關柳州道中五嶺炎蒸苦征夫各憚行荒哉秦象郡痛矣柳龍城水毒人多病烟昬馬易驚里閭彫瘵甚邊將莫言兵至永州萬里歸来一葉舟淡烟疎雨滿汀洲夢魂怪得清如許身在瀟湘第一州浯溪題元次山頌後羯鼓梨園跡已荒斯文猶在日星光我来細拂青苔石不憶三郎憶澷郎迴衡山縣望南嶽呈御史完顔正夫修撰龐夷簡雨洗松隂綠未乾今朝山下倚闌干一天露重月華濕七十二峯生翠寒漠漠寒汀浮芰荷沉沉幽壑舞蛟鼉祝融峯頂定有雨一夜瀟湘烟浪多回雁峯前一棹孤平波如鏡浸菰蒲楚天日落碧雲合山北山南聞鷓鴣迴過湘隂縣牛斗槎邊小客星北溟萬里渡南溟三生帶得烟波福又泛瀟湘過洞庭泊安慶府呈貢父共擁旄幢度百蠻今朝忽過皖公山幸承乙夜君王問更喜丁年奉使還舊夢未迷天祿閣新愁猶憶鬼門關塵纓笑濯滄浪水少伴沙鷗半日閒采石月題蛾眉亭昔年李白身飜然袖裹明月飛上天剛風吹度瑶圃前雪兎跳落千丈泉白今已去八百年明月猶向江中圓我行萬里擁使旃柳根偶繫東歸船三生似結明月緣銀光射牖窺我眠夜深忽夢羽衣仙神如碧沼浮疎蓮脚踏赤鯨跨紫烟問月何在摇玉鞭聳身忽滅鴻翩翩覺来試鼓朱絲絃起誦國風月出篇開篷視月月滿川魚龍吐浪聲濺濺交州使還感事二首少年偶此請長纓命落南州一羽輕萬里上林無雁到三更函谷有鷄鳴金戈影裏丹心苦銅鼓聲中白髪生孚年三十五已見二毛矣已幸歸来身復在夢回猶覺瘴魂驚寳劔金符笑此身灞陵今是舊將軍榻前未上征遼疏囊㡳空留諭蜀文七十親闈雙鬢雪八千客路一鞭雲何時歸棹烟江上閒對沙鷗洗瘴氛至元壬辰秋九月朔詔命吏部尚書臣梁曾禮部郎中臣陳孚奉璽書問罪于交趾越翼日召至便殿賜金符襲衣乘馬弓矢器幣諭遣之明年正月二十有四日至其國三月望日世子陳日燇遣陪臣明宇陶子竒奉㫖梁文藻等奉表請命以九月至京師行李之往来及期凡駐偽境五十有二日其山川城邑風俗為圖一卷諭以順福逆禍為書八篇悉已上於史館兹不敢述姑即道中所得詩一百餘首目之曰交州藳以示同志云癸巳除夕孚敬書陳剛中詩集卷二
